<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DnD — Dungeon Master</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=IM+Fell+English:ital@0;1&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  html, body {
    width: 100%; height: 100%;
    overflow: hidden;
    background: #000;
    color: #d4c4a0;
    font-family: 'IM Fell English', Georgia, serif;
    font-size: 20px;
    line-height: 1.85;
  }

  /* ── Background gradient layers (A/B crossfade) ── */
  .bg-layer {
    position: fixed; inset: 0;
    transition: opacity 2.5s ease;
    pointer-events: none;
    z-index: 0;
  }
  #bg-a { opacity: 1; }
  #bg-b { opacity: 0; }

  /* ── Sky canvas (sun/moon/clouds/stars — driven by world_time) ── */
  #sky {
    position: fixed;
    top: 0; left: 0;
    width: 100%; height: 42vh;
    pointer-events: none;
    z-index: 0;
  }

  /* ── Particle canvas ── */
  #particles {
    position: fixed; inset: 0;
    pointer-events: none;
    z-index: 1;
  }

  /* ── Vignette ── */
  #vignette {
    position: fixed; inset: 0;
    background: radial-gradient(ellipse at 50% 45%,
      transparent 30%,
      rgba(0,0,0,0.55) 70%,
      rgba(0,0,0,0.88) 100%);
    pointer-events: none;
    z-index: 2;
  }

  /* ── Decorative border frame ── */
  #frame {
    position: fixed; inset: 16px;
    border: 1px solid rgba(180, 140, 60, 0.25);
    border-radius: 2px;
    box-shadow:
      inset 0 0 60px rgba(0,0,0,0.4),
      0 0 30px rgba(0,0,0,0.7);
    pointer-events: none;
    z-index: 3;
  }
  /* Corner accents */
  #frame::before, #frame::after {
    content: '';
    position: absolute;
    width: 24px; height: 24px;
    border-color: rgba(180, 140, 60, 0.5);
    border-style: solid;
  }
  #frame::before {
    top: -1px; left: -1px;
    border-width: 2px 0 0 2px;
  }
  #frame::after {
    bottom: -1px; right: -1px;
    border-width: 0 2px 2px 0;
  }

  /* ── Scene indicator ── */
  #scene-indicator {
    position: fixed;
    top: 32px;
    left: 50%;
    transform: translateX(-50%);
    font-family: 'Cinzel', serif;
    font-size: 11px;
    letter-spacing: 5px;
    text-transform: uppercase;
    color: rgba(180, 140, 60, 0.6);
    pointer-events: none;
    z-index: 5;
    transition: opacity 0.8s ease;
    white-space: nowrap;
  }
  #scene-indicator.changing {
    opacity: 0;
    transition: opacity 0.4s ease;
  }

  /* ── Text scroll area ── */
  #text-scroll {
    position: fixed; inset: 0;
    overflow-y: auto;
    overflow-x: hidden;
    padding: 72px 18vw 80px 230px;  /* left: sidebar width + gap */
    z-index: 4;
    scroll-behavior: smooth;
    transition: padding-left 0.4s ease;
    /* Hide scrollbar but keep scroll */
    scrollbar-width: none;
  }
  #text-scroll::-webkit-scrollbar { display: none; }
  #text-scroll.sidebar-hidden { padding-left: 60px; }

  /* ── Text content ── */
  #text-content {
    max-width: 820px;
    margin: 0 auto;
    transition: opacity 0.35s ease;
  }

  .dm-block {
    margin-bottom: 2.2em;
    opacity: 0;
    animation: fadeIn 0.6s ease forwards;
  }
  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(6px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  .dm-block p {
    color: #d4c4a0;
    text-shadow: 0 1px 6px rgba(0,0,0,0.8);
  }

  /* Italic for atmospheric/narration lines */
  .dm-block p em { color: #c8b080; }

  /* ── Player action blocks ── */
  .player-block {
    margin-bottom: 2em;
    opacity: 0;
    animation: fadeIn 0.5s ease forwards;
    border-left: 2px solid rgba(120, 175, 210, 0.3);
    padding-left: 1.2em;
  }

  .player-name {
    font-family: 'Cinzel', serif;
    font-size: 10px;
    letter-spacing: 4px;
    text-transform: uppercase;
    color: rgba(130, 185, 215, 0.75);
    margin-bottom: 0.45em;
  }

  .player-block p {
    color: #94b8cc;
    font-style: italic;
    font-size: 0.92em;
    text-shadow: 0 1px 6px rgba(0,0,0,0.8);
  }

  /* ── NPC dialogue blocks ── */
  .npc-block {
    margin-bottom: 2em;
    opacity: 0;
    animation: fadeIn 0.5s ease forwards;
    border-left: 2px solid rgba(200, 160, 64, 0.35);
    padding-left: 1.2em;
  }

  .npc-name {
    font-family: 'Cinzel', serif;
    font-size: 10px;
    letter-spacing: 4px;
    text-transform: uppercase;
    color: rgba(200, 160, 64, 0.8);
    margin-bottom: 0.45em;
  }

  .npc-block p {
    color: #c8a878;
    font-style: italic;
    font-size: 0.95em;
    text-shadow: 0 1px 6px rgba(0,0,0,0.8);
  }

  /* ── Dice result blocks ── */
  .dice-block {
    margin: 0.4em 0 1.6em;
    opacity: 0;
    animation: fadeIn 0.3s ease forwards;
    text-align: center;
  }

  .dice-result {
    display: inline-block;
    font-family: 'Cinzel', serif;
    font-size: 12px;
    letter-spacing: 2px;
    color: #c8a040;
    text-shadow: 0 0 10px rgba(200, 160, 64, 0.3);
    padding: 0.25em 1.2em;
    border: 1px solid rgba(200, 160, 64, 0.18);
    border-radius: 1px;
  }

  /* Session divider */
  .divider {
    text-align: center;
    color: rgba(180, 140, 60, 0.4);
    font-family: 'Cinzel', serif;
    font-size: 11px;
    letter-spacing: 4px;
    margin: 2em 0;
    user-select: none;
  }
  .divider::before, .divider::after {
    content: '— ';
  }

  /* Cursor blink */
  .cursor {
    display: inline-block;
    width: 2px;
    height: 1.1em;
    background: rgba(180, 140, 60, 0.8);
    vertical-align: middle;
    margin-left: 2px;
    animation: blink 1s step-end infinite;
  }
  @keyframes blink {
    0%, 100% { opacity: 1; }
    50%       { opacity: 0; }
  }

  /* Bottom fade gradient to hint there's more */
  #bottom-fade {
    position: fixed;
    bottom: 0; left: 0; right: 0;
    height: 80px;
    background: linear-gradient(transparent, rgba(0,0,0,0.7));
    pointer-events: none;
    z-index: 4;
  }

  /* ══════════════════════════════════════════════════════════
     CHARACTER SIDEBAR
     Fixed left column. Compact player cards stack vertically.
     Ability scores shown only when there is exactly 1 player.
     ══════════════════════════════════════════════════════════ */

  /* ── Sidebar hide toggle ── */
  #sidebar-toggle {
    position: fixed;
    left: 28px;
    top: 32px;
    z-index: 6;
    background: none;
    border: none;
    cursor: pointer;
    font-family: 'Cinzel', serif;
    font-size: 9px;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: rgba(180,140,60,0.4);
    padding: 2px 6px;
    transition: color 0.3s ease;
    display: none;  /* shown only when sidebar has data */
  }
  #sidebar-toggle:hover { color: rgba(180,140,60,0.8); }
  #sidebar-toggle.visible { display: block; }

  #sidebar {
    position: fixed;
    left: 0;
    top: 60px;
    bottom: 28px;
    width: 210px;
    z-index: 4;
    overflow-y: auto;
    overflow-x: hidden;
    scrollbar-width: none;
    background: linear-gradient(to right, rgba(0,0,0,0.6) 70%, transparent);
    border-right: 1px solid rgba(180,140,60,0.15);
    padding: 10px 12px 16px 28px;
    opacity: 0;
    transition: opacity 0.7s ease, transform 0.4s ease;
    transform: translateX(0);
  }
  #sidebar.has-data { opacity: 1; }
  #sidebar.hidden {
    transform: translateX(-210px);
    opacity: 0;
    pointer-events: none;
  }
  #sidebar::-webkit-scrollbar { display: none; }

  /* ── Player card ── */
  .sb-player {
    margin-bottom: 14px;
    padding-bottom: 14px;
    border-bottom: 1px solid rgba(180,140,60,0.1);
  }
  .sb-player:last-of-type { border-bottom: none; margin-bottom: 0; }

  .sb-name {
    font-family: 'Cinzel', serif;
    font-size: 12px;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: rgba(200,165,80,0.9);
    margin-bottom: 2px;
  }
  .sb-identity {
    font-size: 10px;
    color: rgba(200,185,150,0.5);
    line-height: 1.4;
    margin-bottom: 8px;
  }

  /* ── HP row ── */
  .sb-hp-row {
    display: flex;
    justify-content: space-between;
    align-items: baseline;
    margin-bottom: 3px;
  }
  .sb-label {
    font-family: 'Cinzel', serif;
    font-size: 8px;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: rgba(180,140,60,0.5);
  }
  .sb-hp-nums {
    font-family: 'Cinzel', serif;
    font-size: 10px;
    color: rgba(220,200,160,0.75);
  }
  .sb-bar-track {
    height: 3px;
    background: rgba(255,255,255,0.07);
    border-radius: 2px;
    overflow: hidden;
    margin-bottom: 3px;
  }
  .sb-bar-fill {
    height: 100%;
    border-radius: 2px;
    transition: width 0.6s ease, background-color 0.6s ease;
  }
  .sb-hp-temp-row {
    font-size: 9px;
    color: rgba(120,180,230,0.6);
    margin-bottom: 3px;
  }

  /* ── XP row ── */
  .sb-xp-row {
    display: flex;
    justify-content: space-between;
    align-items: baseline;
    margin-top: 4px;
    margin-bottom: 2px;
  }
  .sb-xp-nums {
    font-family: 'Cinzel', serif;
    font-size: 9px;
    color: rgba(180,140,60,0.55);
  }
  .sb-xp-bar { background: rgba(180,140,60,0.4); }

  /* ── Quick stats (AC · Init · Speed) ── */
  .sb-quick-stats {
    margin-top: 6px;
    font-family: 'Cinzel', serif;
    font-size: 9px;
    letter-spacing: 1px;
    color: rgba(200,185,150,0.55);
    line-height: 1.8;
  }
  .sb-quick-stats span.val {
    color: rgba(220,200,160,0.8);
    margin-right: 8px;
  }

  /* ── Conditions ── */
  .sb-conditions {
    margin-top: 5px;
    display: flex;
    flex-wrap: wrap;
    gap: 3px;
  }
  .sb-condition-pill {
    font-family: 'Cinzel', serif;
    font-size: 7px;
    letter-spacing: 0.5px;
    text-transform: uppercase;
    padding: 1px 5px;
    border-radius: 2px;
    border: 1px solid;
  }
  .sb-condition-pill.danger {
    color: rgba(220,80,80,0.9);
    border-color: rgba(220,80,80,0.35);
    background: rgba(220,80,80,0.08);
  }
  .sb-condition-pill.warn {
    color: rgba(220,150,50,0.9);
    border-color: rgba(220,150,50,0.35);
    background: rgba(220,150,50,0.08);
  }
  .sb-condition-pill.info {
    color: rgba(100,160,220,0.9);
    border-color: rgba(100,160,220,0.35);
    background: rgba(100,160,220,0.08);
  }
  .sb-condition-pill.buff {
    color: rgba(80,200,130,0.9);
    border-color: rgba(80,200,130,0.35);
    background: rgba(80,200,130,0.08);
  }
  /* Concentration tag */
  .sb-concentrate {
    margin-top: 4px;
    font-size: 8px;
    color: rgba(160,120,220,0.75);
    font-style: italic;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  /* ── Features (Second Wind etc) ── */
  .sb-features {
    margin-top: 4px;
    font-size: 9px;
    color: rgba(200,185,150,0.4);
    line-height: 1.6;
  }

  /* ── Ability scores — only rendered when 1 player ── */
  .sb-abilities {
    margin-top: 10px;
    padding-top: 8px;
    border-top: 1px solid rgba(180,140,60,0.08);
  }
  .sb-ab-grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 5px 2px;
  }
  .sb-ab-cell {
    text-align: center;
  }
  .sb-ab-name {
    font-family: 'Cinzel', serif;
    font-size: 7.5px;
    letter-spacing: 1px;
    color: rgba(180,140,60,0.45);
    text-transform: uppercase;
  }
  .sb-ab-score {
    font-family: 'Cinzel', serif;
    font-size: 12px;
    color: rgba(220,200,160,0.8);
    line-height: 1.2;
  }
  .sb-ab-mod {
    font-size: 9px;
    color: rgba(180,140,60,0.65);
    font-family: 'IM Fell English', Georgia, serif;
  }

  /* ── Player card — clickable ── */
  .sb-player {
    cursor: pointer;
    transition: background 0.18s ease;
    border-radius: 3px;
    margin-left: -4px;
    padding-left: 4px;
  }
  .sb-player:hover { background: rgba(180,140,60,0.06); }

  /* ── Character sheet modal ── */
  #sheet-modal {
    display: none;
    position: fixed;
    inset: 0;
    z-index: 9999;
    background: rgba(0,0,0,0.78);
    align-items: center;
    justify-content: center;
  }
  #sheet-modal.open { display: flex; }
  #sheet-panel {
    background: rgba(8,6,4,0.97);
    border: 1px solid rgba(180,140,60,0.3);
    border-radius: 3px;
    box-shadow: 0 0 80px rgba(0,0,0,0.85), inset 0 0 40px rgba(0,0,0,0.5);
    width: min(680px, 90vw);
    max-height: 84vh;
    overflow-y: auto;
    scrollbar-width: thin;
    scrollbar-color: rgba(180,140,60,0.2) transparent;
    padding: 30px 34px 38px;
    position: relative;
    animation: sheetIn 0.18s ease;
  }
  @keyframes sheetIn {
    from { opacity: 0; transform: translateY(10px); }
    to   { opacity: 1; transform: translateY(0); }
  }
  #sheet-close {
    position: absolute; top: 14px; right: 18px;
    background: none; border: none;
    color: rgba(180,140,60,0.45); font-size: 18px;
    cursor: pointer; padding: 4px; line-height: 1;
    transition: color 0.15s;
  }
  #sheet-close:hover { color: rgba(180,140,60,0.9); }
  .sm-name {
    font-family: 'Cinzel', serif; font-size: 19px;
    letter-spacing: 4px; text-transform: uppercase;
    color: rgba(200,165,80,0.95); margin-bottom: 3px;
  }
  .sm-identity {
    font-size: 12px; color: rgba(200,185,150,0.45);
    margin-bottom: 16px; letter-spacing: 1px;
  }
  .sm-divider {
    height: 1px; background: rgba(180,140,60,0.12); margin: 15px 0;
  }
  .sm-section-title {
    font-family: 'Cinzel', serif; font-size: 8.5px;
    letter-spacing: 3px; text-transform: uppercase;
    color: rgba(180,140,60,0.5); margin-bottom: 10px;
  }
  .sm-combat-strip {
    display: flex; gap: 18px; flex-wrap: wrap; margin-bottom: 2px;
  }
  .sm-stat-cell { text-align: center; }
  .sm-stat-label {
    font-family: 'Cinzel', serif; font-size: 7.5px;
    letter-spacing: 2px; text-transform: uppercase;
    color: rgba(180,140,60,0.4); display: block;
  }
  .sm-stat-val {
    font-family: 'Cinzel', serif; font-size: 14px;
    color: rgba(220,200,160,0.88);
  }
  .sm-xp {
    font-size: 10px; color: rgba(180,140,60,0.45);
    font-family: 'Cinzel', serif; letter-spacing: 1px;
    margin-top: 4px;
  }
  .sm-ab-grid {
    display: grid; grid-template-columns: repeat(6, 1fr); gap: 8px;
  }
  .sm-ab-cell { text-align: center; }
  .sm-ab-name {
    font-family: 'Cinzel', serif; font-size: 7.5px;
    letter-spacing: 1px; color: rgba(180,140,60,0.4);
    text-transform: uppercase;
  }
  .sm-ab-score {
    font-family: 'Cinzel', serif; font-size: 15px;
    color: rgba(220,200,160,0.85); line-height: 1.1;
  }
  .sm-ab-mod { font-size: 11px; color: rgba(180,140,60,0.65); }
  .sm-attacks-table {
    width: 100%; border-collapse: collapse; font-size: 12px;
  }
  .sm-attacks-table th {
    font-family: 'Cinzel', serif; font-size: 7.5px; letter-spacing: 1px;
    text-transform: uppercase; color: rgba(180,140,60,0.45);
    text-align: left; padding: 0 10px 6px 0;
    border-bottom: 1px solid rgba(180,140,60,0.1);
  }
  .sm-attacks-table td {
    padding: 5px 10px 5px 0; color: rgba(210,195,160,0.75);
    border-bottom: 1px solid rgba(180,140,60,0.05); vertical-align: top;
  }
  .sm-attacks-table td.atk-name { color: rgba(220,200,160,0.95); }
  .sm-attacks-table td.atk-notes {
    color: rgba(200,185,150,0.45); font-style: italic; font-size: 11px;
  }
  .sm-spell-meta {
    font-size: 11px; color: rgba(200,185,150,0.45);
    margin-bottom: 10px; font-style: italic;
  }
  .sm-sub-label {
    font-family: 'Cinzel', serif; font-size: 8px; letter-spacing: 2px;
    text-transform: uppercase; margin: 8px 0 5px;
  }
  .sm-sub-label.cantrip-label { color: rgba(160,120,220,0.4); }
  .sm-sub-label.prepared-label { color: rgba(180,140,60,0.4); }
  .sm-spell-grid { display: flex; flex-wrap: wrap; gap: 5px; }
  .sm-spell-tag {
    font-size: 11px; color: rgba(200,185,150,0.8);
    background: rgba(180,140,60,0.06);
    border: 1px solid rgba(180,140,60,0.15);
    border-radius: 2px; padding: 3px 8px;
  }
  .sm-spell-tag.cantrip {
    color: rgba(160,120,220,0.8);
    border-color: rgba(160,120,220,0.2);
    background: rgba(160,120,220,0.05);
  }
  .sm-feature { margin-bottom: 10px; }
  .sm-feature-name {
    font-family: 'Cinzel', serif; font-size: 11px;
    color: rgba(200,165,80,0.75); margin-bottom: 2px;
  }
  .sm-feature-text {
    font-size: 12px; color: rgba(200,185,150,0.6); line-height: 1.55;
  }
  .sm-inventory-list {
    list-style: none; column-count: 2; column-gap: 24px;
  }
  .sm-inventory-list li {
    font-size: 12px; color: rgba(200,185,150,0.7);
    padding: 2px 0; break-inside: avoid;
  }
  .sm-inventory-list li::before {
    content: '·  '; color: rgba(180,140,60,0.35);
  }
  .sm-no-data {
    font-size: 12px; color: rgba(200,185,150,0.25);
    font-style: italic; text-align: center; padding: 22px 0;
  }

  /* ── Turn order section ── */
  #sb-turn-section {
    margin-top: 14px;
    padding-top: 10px;
    border-top: 1px solid rgba(180,140,60,0.12);
  }
  .sb-turn-header {
    font-family: 'Cinzel', serif;
    font-size: 8px;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: rgba(180,140,60,0.55);
    margin-bottom: 6px;
  }
  .sb-turn-item {
    font-size: 10px;
    color: rgba(200,185,150,0.4);
    padding: 2px 0 2px 14px;
    line-height: 1.5;
    position: relative;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .sb-turn-item.sb-turn-current {
    color: rgba(220,200,160,0.95);
    font-family: 'Cinzel', serif;
    font-size: 10px;
  }
  .sb-turn-item.sb-turn-current::before {
    content: '▶';
    position: absolute;
    left: 0;
    font-size: 7px;
    color: rgba(180,140,60,0.8);
    top: 4px;
  }

  /* ── CRIT / FUMBLE flash overlay ── */
  #flash-overlay {
    position: fixed; inset: 0;
    pointer-events: none;
    z-index: 9;
    opacity: 0;
  }
  @keyframes flashCrit {
    0%   { opacity: 0; background: radial-gradient(ellipse at 50% 50%, rgba(210,170,40,0.55) 0%, transparent 65%); }
    12%  { opacity: 1; }
    100% { opacity: 0; background: radial-gradient(ellipse at 50% 50%, rgba(210,170,40,0) 0%, transparent 65%); }
  }
  @keyframes flashFumble {
    0%   { opacity: 0; background: radial-gradient(ellipse at 50% 50%, rgba(180,30,30,0.65) 0%, transparent 65%); }
    8%   { opacity: 1; }
    100% { opacity: 0; background: radial-gradient(ellipse at 50% 50%, rgba(180,30,30,0) 0%, transparent 65%); }
  }
  .flash-crit   { animation: flashCrit   2.0s ease-out forwards; }
  .flash-fumble { animation: flashFumble 1.6s ease-out forwards; }

  /* ── HP number flash ── */
  @keyframes hpDmg  { 0% { color:#d05050; } 100% { color:rgba(220,200,160,0.75); } }
  @keyframes hpHeal { 0% { color:#55cc70; } 100% { color:rgba(220,200,160,0.75); } }
  .hp-flash-dmg  { animation: hpDmg  1.4s ease-out forwards; }
  .hp-flash-heal { animation: hpHeal 1.0s ease-out forwards; }

  /* ── World clock ── */

</style>

<body>

<script>
'use strict';

// ═══════════════════════════════════════════════════════════════════
// SCENE MANAGEMENT
// ═══════════════════════════════════════════════════════════════════

const SCENE_DEFAULTS = {
  colors: ['#1a0800', '#2e1400'],
  accent: '#c8601a',
  particles: 'embers',
  label: 'The Inn',
  name: 'tavern',
};

let activeScene = { ...SCENE_DEFAULTS };
let bgActive = 'a'; // which bg layer is currently showing

function applyScene(scene) {
  if (!scene || scene.name === activeScene.name) return;
  activeScene = { ...SCENE_DEFAULTS, ...scene };

  // Update scene indicator with a fade
  const indicator = document.getElementById('scene-indicator');
  indicator.classList.add('changing');
  setTimeout(() => {
    indicator.textContent = '— ' + (activeScene.label || activeScene.name) + ' —';
    indicator.classList.remove('changing');
  }, 400);

  // Crossfade background layers
  const incoming = bgActive === 'a' ? 'b' : 'a';
  const inEl  = document.getElementById('bg-' + incoming);
  const outEl = document.getElementById('bg-' + bgActive);

  const [top, bot] = activeScene.colors;
  inEl.style.background =
    `radial-gradient(ellipse at 50% 30%, ${top} 0%, ${bot} 100%)`;
  inEl.style.opacity = '1';
  outEl.style.opacity = '0';
  bgActive = incoming;

  // Switch particle type
  particleSystem.switchType(activeScene.particles, activeScene.accent);
  // no audio hook on scene change — ambient removed
}

// Initialise background to default scene
;(function initBg() {
  const el = document.getElementById('bg-' + bgActive);
  const [top, bot] = SCENE_DEFAULTS.colors;
  el.style.background =
    `radial-gradient(ellipse at 50% 30%, ${top} 0%, ${bot} 100%)`;
})();


// ═══════════════════════════════════════════════════════════════════
// PARTICLE SYSTEM
// ═══════════════════════════════════════════════════════════════════

const canvas  = document.getElementById('particles');
const ctx     = canvas.getContext('2d');
let W = 0, H = 0;

function resizeCanvas() {
  const dpr = window.devicePixelRatio || 1;
  W = window.innerWidth;
  H = window.innerHeight;
  canvas.width  = W * dpr;
  canvas.height = H * dpr;
  canvas.style.width  = W + 'px';
  canvas.style.height = H + 'px';
  ctx.scale(dpr, dpr);
}
window.addEventListener('resize', resizeCanvas);
resizeCanvas();

// ── Particle classes ──────────────────────────────────────────────

function rand(a, b) { return a + Math.random() * (b - a); }
function randInt(a, b) { return Math.floor(rand(a, b + 1)); }
function hexToRgb(hex) {
  const r = parseInt(hex.slice(1,3),16);
  const g = parseInt(hex.slice(3,5),16);
  const b = parseInt(hex.slice(5,7),16);
  return [r,g,b];
}

class Particle {
  constructor(type, accent) {
    this.type   = type;
    this.accent = accent;
    this.reset();
  }
  reset() {
    const T = this.type;
    this.x    = rand(0, W);
    this.y    = rand(0, H);
    this.life = 0;
    this.maxLife = 1;
    this.size = 2;
    this.alpha = 0;
    this.vx = 0; this.vy = 0;
    this._phase = rand(0, Math.PI * 2);

    if (T === 'embers') {
      this.x = rand(0, W);
      this.y = rand(H * 0.6, H);
      this.vx = rand(-0.4, 0.4);
      this.vy = rand(-0.8, -0.3);
      this.size = rand(1, 3);
      this.maxLife = rand(120, 300);
      this._color = this.accent;
    } else if (T === 'fireflies') {
      this.x = rand(0, W);
      this.y = rand(H * 0.2, H * 0.9);
      this.vx = rand(-0.3, 0.3);
      this.vy = rand(-0.2, 0.2);
      this.size = rand(1.5, 3.5);
      this.maxLife = rand(200, 500);
      this._color = '#a0ff60';
    } else if (T === 'smoke') {
      this.x = rand(0, W);
      this.y = H + 10;
      this.vx = rand(-0.2, 0.2);
      this.vy = rand(-0.4, -0.15);
      this.size = rand(6, 18);
      this.maxLife = rand(180, 350);
      this._color = '#404040';
    } else if (T === 'dust') {
      this.x = rand(0, W);
      this.y = rand(0, H);
      this.vx = rand(-0.1, 0.1);
      this.vy = rand(-0.05, 0.08);
      this.size = rand(0.5, 1.8);
      this.maxLife = rand(300, 600);
      this._color = '#a09060';
    } else if (T === 'snow') {
      this.x = rand(-10, W + 10);
      this.y = rand(-10, 0);
      this.vx = rand(-0.3, 0.3);
      this.vy = rand(0.4, 1.2);
      this.size = rand(1, 3.5);
      this.maxLife = rand(200, 450);
      this._color = '#d8e8ff';
    } else if (T === 'stars') {
      this.x = rand(0, W);
      this.y = rand(0, H * 0.8);
      this.vx = 0; this.vy = 0;
      this.size = rand(0.5, 2);
      this.maxLife = rand(400, 900);
      this._color = '#c0d0ff';
    } else if (T === 'bubbles') {
      this.x = rand(0, W);
      this.y = H + 10;
      this.vx = rand(-0.2, 0.2);
      this.vy = rand(-0.5, -0.2);
      this.size = rand(2, 8);
      this.maxLife = rand(200, 400);
      this._color = '#60a0d0';
    } else if (T === 'sparks') {
      this.x = rand(0, W);
      this.y = rand(H * 0.4, H);
      this.vx = rand(-1.5, 1.5);
      this.vy = rand(-2, -0.5);
      this.size = rand(0.8, 2.5);
      this.maxLife = rand(40, 100);
      this._color = '#ffe060';
    } else if (T === 'sand') {
      this.x = rand(-20, 0);
      this.y = rand(0, H);
      this.vx = rand(1.2, 2.8);
      this.vy = rand(-0.2, 0.4);
      this.size = rand(0.8, 2.2);
      this.maxLife = rand(150, 350);
      this._color = '#c0a060';
    } else if (T === 'rain') {
      this.x = rand(-20, W);
      this.y = rand(-20, 0);
      this.vx = rand(0.5, 1.2);
      this.vy = rand(6, 14);
      this.size = rand(1, 2);
      this.maxLife = rand(60, 120);
      this._color = '#8090b0';
    } else if (T === 'drips') {
      this.x = rand(0, W);
      this.y = rand(-20, 0);
      this.vx = 0;
      this.vy = rand(1.5, 4);
      this.size = rand(1.5, 3.5);
      this.maxLife = rand(80, 180);
      this._color = '#6090b0';
    } else if (T === 'mist') {
      this.x = rand(-120, W + 120);
      this.y = rand(H * 0.05, H * 0.85);
      this.vx = rand(0.04, 0.18);
      this.vy = rand(-0.015, 0.015);
      this.size = rand(70, 180);
      this.maxLife = rand(700, 1400);
      this._color = '#7888a0';
    } else if (T === 'leaves') {
      this.x = rand(0, W);
      this.y = rand(-20, 0);
      this.vx = rand(-0.7, 0.7);
      this.vy = rand(0.5, 1.6);
      this.size = rand(4, 9);
      this.maxLife = rand(220, 520);
      this._rot = rand(0, Math.PI * 2);
      this._rotSpeed = rand(-0.045, 0.045);
      const lc = ['#8B4513','#D2691E','#c8a020','#CD853F','#a06828'];
      this._color = lc[randInt(0, lc.length - 1)];
    } else if (T === 'ripples') {
      this.x = rand(0, W);
      this.y = rand(H * 0.55, H);
      this.vx = 0; this.vy = 0;
      this.size = rand(6, 22);
      this.maxLife = rand(100, 220);
      this._color = '#4888c0';
    } else {
      // fallback = dust
      this.vx = 0; this.vy = 0;
      this.size = 1;
      this.maxLife = 300;
      this._color = '#808080';
    }
  }

  update() {
    this.life++;
    const T = this.type;
    const progress = this.life / this.maxLife;

    // Alpha envelope: fade in first 10%, full mid, fade out last 20%
    if (progress < 0.1)       this.alpha = progress / 0.1;
    else if (progress > 0.8)  this.alpha = (1 - progress) / 0.2;
    else                      this.alpha = 1;

    this.x += this.vx;
    this.y += this.vy;

    if (T === 'embers') {
      this.vx += rand(-0.05, 0.05);
      this.vx  = Math.max(-0.6, Math.min(0.6, this.vx));
      if (this.life % 20 === 0) this.alpha *= rand(0.5, 1.0);
    } else if (T === 'fireflies') {
      this._phase += 0.03;
      this.x += Math.sin(this._phase) * 0.5;
      this.y += Math.cos(this._phase * 0.7) * 0.3;
      this.alpha *= (0.85 + 0.15 * Math.sin(this._phase * 2));
    } else if (T === 'smoke') {
      this.size += 0.04;
      this.vx  += rand(-0.01, 0.01);
    } else if (T === 'stars') {
      this._phase += 0.02;
      this.alpha *= (0.85 + 0.15 * Math.sin(this._phase));
    } else if (T === 'sparks') {
      this.vy += 0.08; // gravity
    } else if (T === 'leaves') {
      this._rot += this._rotSpeed;
      this.vx += rand(-0.025, 0.025);
      this.vx = Math.max(-1.2, Math.min(1.2, this.vx));
    } else if (T === 'ripples') {
      this.size += 0.55;
    }

    return this.life < this.maxLife;
  }

  draw(ctx) {
    const T = this.type;
    const [r,g,b] = hexToRgb(this._color);
    ctx.globalAlpha = Math.max(0, Math.min(1, this.alpha));

    if (T === 'smoke') {
      const grad = ctx.createRadialGradient(
        this.x, this.y, 0, this.x, this.y, this.size);
      grad.addColorStop(0, `rgba(${r},${g},${b},0.3)`);
      grad.addColorStop(1, `rgba(${r},${g},${b},0)`);
      ctx.fillStyle = grad;
      ctx.beginPath();
      ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
      ctx.fill();
    } else if (T === 'embers' || T === 'fireflies' || T === 'sparks') {
      // Glow effect
      const glow = ctx.createRadialGradient(
        this.x, this.y, 0, this.x, this.y, this.size * 3);
      glow.addColorStop(0, `rgba(${r},${g},${b},0.6)`);
      glow.addColorStop(1, `rgba(${r},${g},${b},0)`);
      ctx.fillStyle = glow;
      ctx.beginPath();
      ctx.arc(this.x, this.y, this.size * 3, 0, Math.PI * 2);
      ctx.fill();
      // Core dot
      ctx.fillStyle = `rgb(${Math.min(255,r+60)},${Math.min(255,g+40)},${Math.min(255,b+20)})`;
      ctx.beginPath();
      ctx.arc(this.x, this.y, this.size * 0.6, 0, Math.PI * 2);
      ctx.fill();
    } else if (T === 'bubbles') {
      ctx.strokeStyle = `rgba(${r},${g},${b},0.6)`;
      ctx.lineWidth = 0.8;
      ctx.beginPath();
      ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
      ctx.stroke();
    } else if (T === 'rain') {
      ctx.strokeStyle = `rgba(${r},${g},${b},0.5)`;
      ctx.lineWidth = 0.8;
      ctx.beginPath();
      ctx.moveTo(this.x, this.y);
      ctx.lineTo(this.x + this.vx * 3, this.y + this.vy * 3);
      ctx.stroke();
    } else if (T === 'drips') {
      ctx.fillStyle = `rgba(${r},${g},${b},0.7)`;
      ctx.beginPath();
      ctx.ellipse(this.x, this.y, this.size * 0.4, this.size, 0, 0, Math.PI * 2);
      ctx.fill();
    } else if (T === 'mist') {
      const mg = ctx.createRadialGradient(this.x, this.y, 0, this.x, this.y, this.size);
      mg.addColorStop(0, `rgba(${r},${g},${b},0.055)`);
      mg.addColorStop(1, `rgba(${r},${g},${b},0)`);
      ctx.fillStyle = mg;
      ctx.beginPath();
      ctx.ellipse(this.x, this.y, this.size, this.size * 0.38, 0, 0, Math.PI * 2);
      ctx.fill();
    } else if (T === 'leaves') {
      ctx.save();
      ctx.translate(this.x, this.y);
      ctx.rotate(this._rot);
      ctx.fillStyle = `rgba(${r},${g},${b},0.88)`;
      ctx.beginPath();
      ctx.ellipse(0, 0, this.size * 0.42, this.size, 0, 0, Math.PI * 2);
      ctx.fill();
      ctx.restore();
    } else if (T === 'ripples') {
      ctx.strokeStyle = `rgba(${r},${g},${b},0.28)`;
      ctx.lineWidth = 0.9;
      ctx.beginPath();
      ctx.ellipse(this.x, this.y, this.size, this.size * 0.28, 0, 0, Math.PI * 2);
      ctx.stroke();
    } else {
      ctx.fillStyle = `rgba(${r},${g},${b},1)`;
      ctx.beginPath();
      ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
      ctx.fill();
    }

    ctx.globalAlpha = 1;
  }
}

// ── Particle system controller ────────────────────────────────────

const PARTICLE_COUNT = {
  embers: 80, fireflies: 45, smoke: 20, dust: 90,
  snow: 110, stars: 160, bubbles: 45, sparks: 50,
  sand: 80, rain: 130, drips: 35,
  mist: 12, leaves: 55, ripples: 18,
};

const particleSystem = {
  particles: [],
  type: 'embers',
  accent: SCENE_DEFAULTS.accent,
  transitioning: false,

  init() {
    this.populate(this.type, this.accent);
  },

  populate(type, accent) {
    const count = PARTICLE_COUNT[type] || 60;
    this.particles = [];
    for (let i = 0; i < count; i++) {
      const p = new Particle(type, accent);
      p.life = randInt(0, p.maxLife);  // stagger so they don't all start together
      this.particles.push(p);
    }
  },

  switchType(newType, accent) {
    if (newType === this.type) return;
    this.type   = newType;
    this.accent = accent || '#ffffff';
    // Fade out current by letting them die, then repopulate
    // Mark old particles so they run out fast
    this.particles.forEach(p => { p.life = Math.max(p.life, p.maxLife - 30); });
    // Add new particles over ~2s
    let added = 0;
    const target = PARTICLE_COUNT[newType] || 60;
    const interval = setInterval(() => {
      if (added >= target) { clearInterval(interval); return; }
      const p = new Particle(newType, this.accent);
      this.particles.push(p);
      added++;
    }, 2000 / target);
  },

  update() {
    this.particles = this.particles.filter(p => p.update());
    // Replenish
    const target = PARTICLE_COUNT[this.type] || 60;
    while (this.particles.length < target) {
      const p = new Particle(this.type, this.accent);
      this.particles.push(p);
    }
  },

  draw() {
    ctx.clearRect(0, 0, W, H);
    this.particles.forEach(p => p.draw(ctx));
  },
};

particleSystem.init();

// ── Sky Renderer ──────────────────────────────────────────────────

const skyCanvas = document.getElementById('sky');
const skyCtx    = skyCanvas.getContext('2d');
let SW = 0, SH = 0;

function resizeSky() {
  const dpr = window.devicePixelRatio || 1;
  SW = window.innerWidth;
  SH = Math.round(window.innerHeight * 0.42);
  skyCanvas.width  = SW * dpr;
  skyCanvas.height = SH * dpr;
  skyCanvas.style.width  = SW + 'px';
  skyCanvas.style.height = SH + 'px';
  skyCtx.setTransform(dpr, 0, 0, dpr, 0, 0);
}
window.addEventListener('resize', resizeSky);
resizeSky();

const skyRenderer = (() => {
  let _time = 'morning', _weather = '';

  // Pre-computed star positions (twinkling dots, night only)
  const STARS = Array.from({length: 130}, () => ({
    x: Math.random(), y: Math.random(),
    r: 0.4 + Math.random() * 1.6,
    ph: Math.random() * Math.PI * 2,
    spd: 0.008 + Math.random() * 0.022,
  }));

  // Cloud objects — drift left, wrap to right
  const CLOUD_BLOBS = [[0,0,30],[-25,10,23],[23,8,25],[-9,-12,19],[13,-9,17],[36,14,17],[-36,14,15],[6,16,13]];
  const CLOUDS = Array.from({length: 5}, (_, i) => ({
    x: (i / 5) * (SW + 600) - 100,
    y: 0, sc: 1, spd: 0.1,
  }));
  function resetCloud(c, offscreen) {
    c.x   = offscreen ? SW + rand(100, 350) : rand(-200, SW + 200);
    c.y   = rand(SH * 0.06, SH * 0.68);
    c.sc  = rand(0.65, 1.75);
    c.spd = rand(0.07, 0.22);
  }
  CLOUDS.forEach(c => resetCloud(c, false));

  function drawCloud(c, opacity, color) {
    skyCtx.globalAlpha = opacity;
    skyCtx.fillStyle = color;
    CLOUD_BLOBS.forEach(([dx, dy, r]) => {
      skyCtx.beginPath();
      skyCtx.arc(c.x + dx * c.sc, c.y + dy * c.sc, r * c.sc, 0, Math.PI * 2);
      skyCtx.fill();
    });
    skyCtx.globalAlpha = 1;
  }

  function glow(x, y, r0, r1, c0, c1) {
    const g = skyCtx.createRadialGradient(x, y, r0, x, y, r1);
    g.addColorStop(0, c0); g.addColorStop(1, c1);
    skyCtx.fillStyle = g;
    skyCtx.beginPath();
    skyCtx.arc(x, y, r1, 0, Math.PI * 2);
    skyCtx.fill();
  }

  return {
    setState(wt) {
      if (!wt) return;
      _time    = (wt.time    || 'morning').toLowerCase();
      _weather = (wt.weather || '').toLowerCase();
    },

    draw() {
      skyCtx.clearRect(0, 0, SW, SH);

      const isNight  = /night|midnight|late/.test(_time);
      const isDusk   = /evening|dusk/.test(_time);
      const isDawn   = /dawn/.test(_time);
      const isRain   = /rain|storm/.test(_weather);
      const isCloudy = /cloud|overcast/.test(_weather) || isRain;
      const isFog    = /fog|mist/.test(_weather);

      // Stars (night / dusk)
      if (isNight || isDusk) {
        const mod = isNight ? 1 : 0.35;
        STARS.forEach(s => {
          s.ph += s.spd;
          const a = (0.25 + 0.55 * Math.sin(s.ph)) * mod * (isRain ? 0.15 : 1);
          if (a <= 0.01) return;
          skyCtx.globalAlpha = a;
          skyCtx.fillStyle = '#c8d4ff';
          skyCtx.beginPath();
          skyCtx.arc(s.x * SW, s.y * SH, s.r, 0, Math.PI * 2);
          skyCtx.fill();
        });
        skyCtx.globalAlpha = 1;
      }

      // Moon (night / dusk)
      if (isNight || isDusk) {
        const mx = SW * 0.76, my = SH * 0.24;
        const ma = isNight ? 0.82 : 0.32;
        glow(mx, my, 10, 72, `rgba(190,200,230,${(ma * 0.18).toFixed(2)})`, 'rgba(190,200,230,0)');
        skyCtx.globalAlpha = ma;
        skyCtx.fillStyle = '#d8e0f4';
        skyCtx.beginPath(); skyCtx.arc(mx, my, 15, 0, Math.PI * 2); skyCtx.fill();
        // Crescent: paint shadow circle using clip
        skyCtx.save();
        skyCtx.beginPath(); skyCtx.arc(mx, my, 15, 0, Math.PI * 2); skyCtx.clip();
        skyCtx.fillStyle = 'rgba(8,12,28,0.82)';
        skyCtx.beginPath(); skyCtx.arc(mx + 9, my - 4, 13, 0, Math.PI * 2); skyCtx.fill();
        skyCtx.restore();
        skyCtx.globalAlpha = 1;
      }

      // Sun (day / dusk / dawn)
      if (!isNight) {
        let sx, sy, inner, outer;
        if (isDawn) {
          [sx, sy] = [SW * 0.12, SH * 0.90];
          [inner, outer] = ['rgba(255,155,55,0.72)', 'rgba(255,100,20,0)'];
        } else if (/morning/.test(_time)) {
          [sx, sy] = [SW * 0.18, SH * 0.38];
          [inner, outer] = ['rgba(255,225,130,0.62)', 'rgba(255,200,80,0)'];
        } else if (/midday|noon/.test(_time)) {
          [sx, sy] = [SW * 0.50, SH * 0.06];
          [inner, outer] = ['rgba(255,248,190,0.44)', 'rgba(255,245,160,0)'];
        } else if (/afternoon/.test(_time)) {
          [sx, sy] = [SW * 0.80, SH * 0.32];
          [inner, outer] = ['rgba(255,215,100,0.55)', 'rgba(255,185,60,0)'];
        } else { // evening / dusk
          [sx, sy] = [SW * 0.88, SH * 0.84];
          [inner, outer] = ['rgba(245,110,28,0.75)', 'rgba(210,65,0,0)'];
        }
        glow(sx, sy, 4, 95, inner, outer);
        glow(sx, sy, 0, 26, inner.replace(/[\d.]+\)$/, '1)'), inner.replace(/[\d.]+\)$/, '0)'));
      }

      // Clouds
      const cloudAlpha = isRain ? 0.40 : isCloudy ? 0.22 : isFog ? 0.14 : 0.08;
      const cloudCount = isRain ? 5  : isCloudy ? 4 : 2;
      const cloudColor = isNight ? '#303248' : isDusk ? '#a05828' : isRain ? '#3a3c4c' : '#c4c8d8';
      const windMult   = isRain ? 2.2 : 1;

      CLOUDS.forEach((c, i) => {
        if (i >= cloudCount) return;
        c.x -= c.spd * windMult;
        if (c.x < -300 * c.sc) resetCloud(c, true);
        const ao = cloudAlpha * (0.7 + 0.06 * i);
        drawCloud(c, ao, cloudColor);
      });

      // Bottom gradient fade — sky dissolves into scene background
      skyCtx.globalCompositeOperation = 'destination-out';
      const fade = skyCtx.createLinearGradient(0, SH * 0.52, 0, SH);
      fade.addColorStop(0, 'rgba(0,0,0,0)');
      fade.addColorStop(1, 'rgba(0,0,0,1)');
      skyCtx.fillStyle = fade;
      skyCtx.fillRect(0, SH * 0.52, SW, SH * 0.48);
      skyCtx.globalCompositeOperation = 'source-over';
    },
  };
})();

// ── Animation loop ────────────────────────────────────────────────

function loop() {
  particleSystem.update();
  particleSystem.draw();
  skyRenderer.draw();
  requestAnimationFrame(loop);
}
loop();


// ═══════════════════════════════════════════════════════════════════
// TYPEWRITER / TEXT RENDERING
// ═══════════════════════════════════════════════════════════════════

const textScroll  = document.getElementById('text-scroll');
const textContent = document.getElementById('text-content');

let charQueue    = [];
let isTyping     = false;
let currentEl    = null;
let currentCursor = null;
let lastChunkTime = Date.now();
let idleTimer     = null;

const CHAR_DELAY = 18;   // ms per character while typing
const IDLE_GAP   = 1800; // ms silence before starting a new block

function getOrCreateBlock() {
  if (!currentEl) {
    currentEl = document.createElement('div');
    currentEl.className = 'dm-block';
    const p = document.createElement('p');
    currentEl.appendChild(p);
    textContent.appendChild(currentEl);
    scrollToBottom();
  }
  return currentEl.querySelector('p:last-child');
}

function typeNextChar() {
  if (charQueue.length === 0) {
    isTyping = false;
    // Keep cursor blinking at end
    return;
  }

  const ch = charQueue.shift();
  const p  = getOrCreateBlock();

  // Remove cursor from previous position
  if (currentCursor && currentCursor.parentNode) {
    currentCursor.parentNode.removeChild(currentCursor);
  }

  if (ch === '\n') {
    // New paragraph inside same block — unless it's a blank line
    const next = document.createElement('p');
    currentEl.appendChild(next);
  } else {
    p.appendChild(document.createTextNode(ch));
  }

  // Re-add cursor
  currentCursor = document.createElement('span');
  currentCursor.className = 'cursor';
  const lastP = currentEl.querySelector('p:last-child');
  lastP.appendChild(currentCursor);

  scrollToBottom();
  setTimeout(typeNextChar, CHAR_DELAY);
}

function startTyping() {
  if (isTyping) return;
  isTyping = true;
  typeNextChar();
}

function flushNewBlock() {
  // Finalise the current block and start a fresh one next time
  if (currentCursor && currentCursor.parentNode) {
    currentCursor.parentNode.removeChild(currentCursor);
    currentCursor = null;
  }
  // Add a soft divider if there was content
  if (currentEl) {
    const div = document.createElement('div');
    div.className = 'divider';
    div.textContent = '✦';
    textContent.appendChild(div);
  }
  currentEl = null;
}

// ── Shared: flush cursor and currentEl before inserting a non-DM block ──
function _flushForBlock() {
  if (currentCursor && currentCursor.parentNode) {
    currentCursor.parentNode.removeChild(currentCursor);
    currentCursor = null;
  }
  currentEl = null;
  clearTimeout(idleTimer);
}

// ── Shared: after inserting a non-DM block, re-establish cursor below it ──
// If typing is still in progress, immediately open the next DM block so the
// cursor appears below the inserted block rather than going invisible.
function _reanchorCursor() {
  if ((isTyping || charQueue.length > 0) && !currentEl) {
    const p = getOrCreateBlock();
    currentCursor = document.createElement('span');
    currentCursor.className = 'cursor';
    p.appendChild(currentCursor);
  }
  scrollToBottom();
}

// ── Player action block ──────────────────────────────────────────────
function renderPlayerBlock(name, text, isReplay) {
  _flushForBlock();

  const block = document.createElement('div');
  block.className = 'player-block';
  if (isReplay) block.style.opacity = '0.65';

  const nameEl = document.createElement('div');
  nameEl.className = 'player-name';
  nameEl.textContent = name;
  block.appendChild(nameEl);

  const cleaned = text
    .replace(/[\x00-\x08\x0b-\x1f\x7f]/g, '')
    .replace(/\r/g, '')
    .replace(/\t/g, '  ')
    .trim();

  cleaned.split('\n').forEach(line => {
    const trimmed = line.trim();
    if (!trimmed) return;
    const p = document.createElement('p');
    p.textContent = trimmed;
    block.appendChild(p);
  });

  textContent.appendChild(block);
  _reanchorCursor();
}

// ── NPC dialogue block ───────────────────────────────────────────────
function renderNPCBlock(name, text, isReplay) {
  _flushForBlock();

  const block = document.createElement('div');
  block.className = 'npc-block';
  if (isReplay) block.style.opacity = '0.65';

  const nameEl = document.createElement('div');
  nameEl.className = 'npc-name';
  nameEl.textContent = name;
  block.appendChild(nameEl);

  const cleaned = text
    .replace(/[\x00-\x08\x0b-\x1f\x7f]/g, '')
    .replace(/\r/g, '')
    .replace(/\t/g, '  ')
    .trim();

  cleaned.split('\n').forEach(line => {
    const trimmed = line.trim();
    if (!trimmed) return;
    const p = document.createElement('p');
    p.textContent = trimmed;
    block.appendChild(p);
  });

  textContent.appendChild(block);
  _reanchorCursor();
}

// ── Dice result block ─────────────────────────────────────────────────
function renderDiceBlock(text, isReplay) {
  _flushForBlock();

  const block = document.createElement('div');
  block.className = 'dice-block';
  if (isReplay) block.style.opacity = '0.65';

  const cleaned = text.trim()
    .replace(/[\x00-\x08\x0b-\x1f\x7f]/g, '')
    .replace(/\r/g, '');

  let hasCrit = false, hasFumble = false;
  cleaned.split('\n').forEach(line => {
    const trimmed = line.trim();
    if (!trimmed) return;
    const el = document.createElement('div');
    el.className = 'dice-result';
    el.textContent = trimmed;
    block.appendChild(el);
    if (/CRITICAL HIT/i.test(trimmed)) hasCrit = true;
    if (/FUMBLE/i.test(trimmed))        hasFumble = true;
  });

  if (!isReplay) {
    if (hasCrit)   triggerFlash('crit');
    else if (hasFumble) triggerFlash('fumble');
  }

  textContent.appendChild(block);
  _reanchorCursor();
}

// ── Replay batch (reconnect / session resume) ─────────────────────────
function renderReplayBatch(items) {
  flushNewBlock();
  items.forEach(item => {
    if (!item || !item.text) return;
    if (item.player) {
      renderPlayerBlock(item.player, item.text, true);
    } else if (item.npc) {
      renderNPCBlock(item.npc, item.text, true);
    } else if (item.dice) {
      renderDiceBlock(item.text, true);
    } else {
      const block = document.createElement('div');
      block.className = 'dm-block';
      block.style.opacity = '0.75';
      item.text.split('\n').forEach(line => {
        const p = document.createElement('p');
        p.textContent = line;
        block.appendChild(p);
      });
      textContent.appendChild(block);
    }
  });

  const div = document.createElement('div');
  div.className = 'divider';
  div.textContent = '✦';
  textContent.appendChild(div);

  scrollToBottom();
}

function clearDisplay(then) {
  // Fade out, wipe, fade back in, then call the callback.
  textContent.style.opacity = '0';
  setTimeout(() => {
    // Abort any in-progress typewriter
    charQueue = [];
    isTyping  = false;
    if (currentCursor && currentCursor.parentNode) {
      currentCursor.parentNode.removeChild(currentCursor);
    }
    currentCursor = null;
    currentEl     = null;
    clearTimeout(idleTimer);

    textContent.innerHTML = '';
    textScroll.scrollTop  = 0;
    textContent.style.opacity = '1';

    if (then) then();
  }, 370); // matches the CSS transition duration
}

function handleIncomingText(text) {
  // Debounce block separation: if there was a gap > IDLE_GAP, new block
  const now = Date.now();
  if (now - lastChunkTime > IDLE_GAP && charQueue.length === 0 && !isTyping) {
    flushNewBlock();
  }
  lastChunkTime = now;

  // Reset idle timer
  clearTimeout(idleTimer);
  idleTimer = setTimeout(() => {
    if (!isTyping && charQueue.length === 0) flushNewBlock();
  }, IDLE_GAP * 2);

  // Enqueue characters
  const cleaned = text
    .replace(/[\x00-\x08\x0b-\x1f\x7f]/g, '')  // strip control chars (keep \n \t)
    .replace(/\[[\d;?]*[a-zA-Z]/g, '')           // strip leftover CSI remnants
    .replace(/\r/g, '')
    .replace(/\t/g, '  ');
  for (const ch of cleaned) {
    charQueue.push(ch);
  }

  startTyping();
}

function scrollToBottom() {
  textScroll.scrollTop = textScroll.scrollHeight;
}

function renderReplay(text) {
  // Render historical text instantly (no typewriter) when browser reconnects.
  flushNewBlock();
  const cleaned = text
    .replace(/[\x00-\x08\x0b-\x1f\x7f]/g, '')
    .replace(/\[[\d;?]*[a-zA-Z]/g, '')
    .replace(/\r/g, '')
    .replace(/\t/g, '  ');
  if (!cleaned.trim()) return;

  const block = document.createElement('div');
  block.className = 'dm-block';
  block.style.opacity = '0.75';   // subtle visual distinction for historical text
  cleaned.split('\n').forEach(line => {
    const p = document.createElement('p');
    p.textContent = line;
    block.appendChild(p);
  });
  textContent.appendChild(block);

  // Add a divider after replay so live text starts fresh
  const div = document.createElement('div');
  div.className = 'divider';
  div.textContent = '✦';
  textContent.appendChild(div);

  scrollToBottom();
}

// Keyed by player name so repeated calls merge cleanly.
const _playerData = {};

// ── CRIT / FUMBLE flash ─────────────────────────────────────────────
const _flashOverlay = document.getElementById('flash-overlay');
function triggerFlash(type) {
  _flashOverlay.classList.remove('flash-crit', 'flash-fumble');
  // Force reflow so the animation restarts cleanly
  void _flashOverlay.offsetWidth;
  _flashOverlay.classList.add(type === 'crit' ? 'flash-crit' : 'flash-fumble');
}

// ── HP change tracking (for colour flash on sidebar numerals) ───────
const _prevHp = {}; // { playerName: currentHp }

function _hpColor(pct) {
  if (pct > 60) return '#4a9a4a';
  if (pct > 30) return '#c0901a';
  return '#a03030';
}

function _buildPlayerCard(p, solo) {
  const card = document.createElement('div');
  card.className = 'sb-player';
  card.dataset.playerName = p.name;

  // Name
  const nameEl = document.createElement('div');
  nameEl.className = 'sb-name';
  nameEl.textContent = p.name || '—';
  card.appendChild(nameEl);

  // Identity: Race · Class Level
  const identEl = document.createElement('div');
  identEl.className = 'sb-identity';
  const parts = [];
  if (p.race)  parts.push(p.race);
  if (p.class) parts.push(p.class + (p.level ? ' ' + p.level : ''));
  if (p.background) parts.push(p.background);
  identEl.textContent = parts.join(' · ') || '—';
  card.appendChild(identEl);

  // HP
  const hp = p.hp || {};
  const hpRow = document.createElement('div');
  hpRow.className = 'sb-hp-row';
  hpRow.innerHTML = `<span class="sb-label">HP</span>
    <span class="sb-hp-nums">${hp.current ?? '—'} / ${hp.max ?? '—'}</span>`;
  card.appendChild(hpRow);

  const hpTrack = document.createElement('div');
  hpTrack.className = 'sb-bar-track';
  const hpFill = document.createElement('div');
  hpFill.className = 'sb-bar-fill';
  hpFill.dataset.role = 'hp-fill';
  const hpPct = (hp.max && hp.current != null) ? Math.max(0, Math.min(100, (hp.current / hp.max) * 100)) : 100;
  hpFill.style.width = hpPct + '%';
  hpFill.style.backgroundColor = _hpColor(hpPct);
  hpTrack.appendChild(hpFill);
  card.appendChild(hpTrack);

  if (hp.temp) {
    const tempEl = document.createElement('div');
    tempEl.className = 'sb-hp-temp-row';
    tempEl.dataset.role = 'hp-temp';
    tempEl.textContent = '+' + hp.temp + ' temp';
    card.appendChild(tempEl);
  }

  // XP
  const xp = p.xp || {};
  if (xp.current != null) {
    const xpRow = document.createElement('div');
    xpRow.className = 'sb-xp-row';
    xpRow.innerHTML = `<span class="sb-label">XP</span>
      <span class="sb-xp-nums">${xp.current} / ${xp.next ?? '?'}</span>`;
    card.appendChild(xpRow);
    const xpTrack = document.createElement('div');
    xpTrack.className = 'sb-bar-track';
    const xpFill = document.createElement('div');
    xpFill.className = 'sb-bar-fill sb-xp-bar';
    xpFill.dataset.role = 'xp-fill';
    const xpPct = (xp.next && xp.current != null) ? Math.max(0, Math.min(100, (xp.current / xp.next) * 100)) : 0;
    xpFill.style.width = xpPct + '%';
    xpTrack.appendChild(xpFill);
    card.appendChild(xpTrack);
  }

  // Quick combat stats
  const quickLines = [];
  if (p.ac        != null) quickLines.push(`AC <span class="val">${p.ac}</span>`);
  if (p.initiative != null) quickLines.push(`Init <span class="val">${p.initiative}</span>`);
  if (p.speed     != null) quickLines.push(`Spd <span class="val">${p.speed}</span>`);
  if (p.hit_dice) {
    const hd = p.hit_dice;
    quickLines.push(`HD <span class="val">${hd.remaining ?? '?'}/${hd.max ?? '?'} ${hd.die || ''}</span>`);
  }
  if (quickLines.length) {
    const qs = document.createElement('div');
    qs.className = 'sb-quick-stats';
    qs.innerHTML = quickLines.join('<br>');
    card.appendChild(qs);
  }

  // Conditions
  const CONDITION_CLASS = {
    unconscious: 'danger', paralyzed: 'danger', petrified: 'danger', stunned: 'danger',
    incapacitated: 'warn', frightened: 'warn', poisoned: 'warn', charmed: 'warn', exhausted: 'warn',
    grappled: 'info', restrained: 'info', prone: 'info', blinded: 'info', deafened: 'info',
    invisible: 'buff',
  };
  const conditions = p.conditions || [];
  if (conditions.length) {
    const condEl = document.createElement('div');
    condEl.className = 'sb-conditions';
    condEl.dataset.role = 'conditions';
    conditions.forEach(c => {
      const pill = document.createElement('span');
      const cls  = CONDITION_CLASS[c.toLowerCase()] || 'info';
      pill.className   = `sb-condition-pill ${cls}`;
      pill.textContent = c;
      condEl.appendChild(pill);
    });
    card.appendChild(condEl);
  } else {
    // Placeholder so merges can clear it
    const condEl = document.createElement('div');
    condEl.className = 'sb-conditions';
    condEl.dataset.role = 'conditions';
    card.appendChild(condEl);
  }

  // Concentration
  if (p.concentration) {
    const concEl = document.createElement('div');
    concEl.className = 'sb-concentrate';
    concEl.dataset.role = 'concentration';
    concEl.textContent = `◈ ${p.concentration}`;
    card.appendChild(concEl);
  }

  // Features (Second Wind etc)
  const feats = [];
  if (p.second_wind != null) {
    feats.push(p.second_wind ? '2nd Wind ✓' : '2nd Wind ✗');
  }
  if (feats.length) {
    const featEl = document.createElement('div');
    featEl.className = 'sb-features';
    featEl.dataset.role = 'features';
    featEl.innerHTML = feats.map(f => {
      const dim = f.endsWith('✗');
      return `<span style="color:${dim ? 'rgba(200,185,150,0.25)' : 'rgba(140,190,140,0.6)'}">${f}</span>`;
    }).join('<br>');
    card.appendChild(featEl);
  }

  // Ability scores — only for solo play
  if (solo && p.ability_scores) {
    const ab = p.ability_scores;
    const abSection = document.createElement('div');
    abSection.className = 'sb-abilities';
    const grid = document.createElement('div');
    grid.className = 'sb-ab-grid';
    ['str','dex','con','int','wis','cha'].forEach(key => {
      const cell = document.createElement('div');
      cell.className = 'sb-ab-cell';
      const d = ab[key] || {};
      cell.innerHTML = `
        <div class="sb-ab-name">${key.toUpperCase()}</div>
        <div class="sb-ab-score">${d.score ?? '—'}</div>
        <div class="sb-ab-mod">${d.mod ?? '—'}</div>`;
      grid.appendChild(cell);
    });
    abSection.appendChild(grid);
    card.appendChild(abSection);
  }

  return card;
}

      tr.innerHTML = `<td class="atk-name">${a.name||'—'}</td>
        <td>${a.bonus||'—'}</td><td>${a.damage||'—'}</td>
        <td>${a.type||'—'}</td><td class="atk-notes">${a.notes||''}</td>`;
      tbody.appendChild(tr);
    });
    table.appendChild(tbody);
    content.appendChild(table);
  }

  // Spells
  if (sheet.spells) {
    const sp = sheet.spells;
    content.appendChild(_smDivider());
    const title = document.createElement('div');
    title.className = 'sm-section-title';
    title.textContent = 'Spellcasting';
    content.appendChild(title);
    if (sp.slots || sp.save_dc || sp.attack_bonus) {
      const meta = document.createElement('div');
      meta.className = 'sm-spell-meta';
      const parts = [];
      if (sp.slots)         parts.push('Slots: ' + sp.slots);
      if (sp.save_dc)       parts.push('Save DC ' + sp.save_dc);
      if (sp.attack_bonus)  parts.push('Atk ' + sp.attack_bonus);
      meta.textContent = parts.join('  ·  ');
      content.appendChild(meta);
    }
    if (sp.cantrips && sp.cantrips.length) {
      const lbl = document.createElement('div');
      lbl.className = 'sm-sub-label cantrip-label';
      lbl.textContent = 'Cantrips';
      content.appendChild(lbl);
      const grid = document.createElement('div');
      grid.className = 'sm-spell-grid';
      sp.cantrips.forEach(s => {
        const tag = document.createElement('span');
        tag.className = 'sm-spell-tag cantrip';
        tag.textContent = s;
        grid.appendChild(tag);
      });
      content.appendChild(grid);
    }
    if (sp.prepared && sp.prepared.length) {
      const lbl = document.createElement('div');
      lbl.className = 'sm-sub-label prepared-label';
      lbl.textContent = 'Prepared';
      content.appendChild(lbl);
      const grid = document.createElement('div');
      grid.className = 'sm-spell-grid';
      sp.prepared.forEach(s => {
        const tag = document.createElement('span');
        tag.className = 'sm-spell-tag';
        tag.textContent = s;
        grid.appendChild(tag);
      });
      content.appendChild(grid);
    }
  }

  // Features & Passives
  if (sheet.features && sheet.features.length) {
    content.appendChild(_smDivider());
    const title = document.createElement('div');
    title.className = 'sm-section-title';
    title.textContent = 'Features & Passives';
    content.appendChild(title);
    sheet.features.forEach(f => {
      const el = document.createElement('div');
      el.className = 'sm-feature';
      el.innerHTML = `<div class="sm-feature-name">${f.name}</div>
        <div class="sm-feature-text">${f.text}</div>`;
      content.appendChild(el);
    });
  }

  // Inventory
  if (sheet.inventory && sheet.inventory.length) {
    content.appendChild(_smDivider());
    const title = document.createElement('div');
    title.className = 'sm-section-title';
    title.textContent = 'Inventory';
    content.appendChild(title);
    const list = document.createElement('ul');
    list.className = 'sm-inventory-list';
    sheet.inventory.forEach(item => {
      const li = document.createElement('li');
      li.textContent = item;
      list.appendChild(li);
    });
    content.appendChild(list);
  }

  // No sheet data hint
  if (!sheet.attacks && !sheet.spells && !sheet.features && !sheet.inventory) {
    content.appendChild(_smDivider());
    const noData = document.createElement('div');
    noData.className = 'sm-no-data';
    noData.textContent = 'Full sheet not loaded — include "sheet" in the player object when pushing stats on /dnd load';
    content.appendChild(noData);
  }

  document.getElementById('sheet-modal').classList.add('open');
  document.getElementById('sheet-panel').scrollTop = 0;
}

function closeSheet() {
  document.getElementById('sheet-modal').classList.remove('open');
}

document.getElementById('sheet-close').addEventListener('click', closeSheet);
document.getElementById('sheet-modal').addEventListener('click', e => {
  if (e.target === document.getElementById('sheet-modal')) closeSheet();
});

// Delegated listener — catches clicks on any .sb-player card even after DOM rebuilds
document.getElementById('sidebar').addEventListener('click', function(e) {
  const card = e.target.closest('.sb-player[data-player-name]');
  if (card) openSheet(card.dataset.playerName);
});
document.addEventListener('keydown', e => {
  if (e.key === 'Escape') closeSheet();
});

// ── Stats update ─────────────────────────────────────────────────────────────

function updateStats(stats) {
  if (!stats || !stats.players) return;
  const sidebar = document.getElementById('sidebar');
  const turnSection = document.getElementById('sb-turn-section');
  const solo = stats.players.length === 1;

  // Merge incoming players into _playerData
  stats.players.forEach(p => {
    if (!p.name) return;
    const existing = _playerData[p.name] || {};
    // Deep merge hp, xp, ability_scores; replace scalars
    for (const [k, v] of Object.entries(p)) {
      if (v !== null && typeof v === 'object' && !Array.isArray(v) && typeof existing[k] === 'object') {
        existing[k] = Object.assign({}, existing[k], v);
      } else {
        existing[k] = v;
      }
    }
    _playerData[p.name] = existing;
  });

  // Rebuild all player cards (insert before turn section)
  const names = Object.keys(_playerData);
  names.forEach(name => {
    const p = _playerData[name];
    const prevHp = _prevHp[name];
    const newHp  = p.hp ? p.hp.current : undefined;

    const existing = sidebar.querySelector(`.sb-player[data-player-name="${CSS.escape(name)}"]`);
    const newCard = _buildPlayerCard(p, solo);
    if (existing) {
      sidebar.insertBefore(newCard, existing);
      existing.remove();
    } else {
      sidebar.insertBefore(newCard, turnSection);
    }

    // Flash HP numeral if HP changed
    if (newHp !== undefined && prevHp !== undefined && newHp !== prevHp) {
      const numsEl = newCard.querySelector('.sb-hp-nums');
      if (numsEl) {
        numsEl.classList.remove('hp-flash-dmg', 'hp-flash-heal');
        void numsEl.offsetWidth;
        numsEl.classList.add(newHp < prevHp ? 'hp-flash-dmg' : 'hp-flash-heal');
      }
    }
    if (newHp !== undefined) _prevHp[name] = newHp;
  });

  sidebar.classList.add('has-data');

  // Turn order
  if ('turn_order' in stats) {
    if (!stats.turn_order) {
      turnSection.style.display = 'none';
    } else {
      const to = stats.turn_order;
      // Merge with existing if partial (only current or only round supplied)
      const existingTo = _currentTurnOrder || {};
      const merged = Object.assign({}, existingTo, to);
      _currentTurnOrder = merged;

      turnSection.style.display = '';
      document.getElementById('sb-round').textContent = merged.round ?? 1;
      const list = document.getElementById('sb-turn-list');
      list.innerHTML = '';
      (merged.order || []).forEach(name => {
        const el = document.createElement('div');
        el.className = 'sb-turn-item' + (name === merged.current ? ' sb-turn-current' : '');
        el.textContent = name;
        list.appendChild(el);
      });
    }
  }
}

let _currentTurnOrder = null;

// ═══════════════════════════════════════════════════════════════════
// AUDIO — SFX only. Python detects triggers from narration text and
// broadcasts {"sfx": name} via SSE. Browser fetches WAV from
// /audio/sfx/<name> and plays via Web Audio API. Toggle click is the
// user gesture that unlocks AudioContext.
// ═══════════════════════════════════════════════════════════════════

const _sfxTrack = document.getElementById('sfx-track');
let _sfxOn  = false;
let _actx   = null;
let _sfxCache = {};

function _setTrack(el, on) {
  on ? el.classList.add('on') : el.classList.remove('on');
}

function _audioCtx() {
  if (!_actx) _actx = new (window.AudioContext || window.webkitAudioContext)();
  if (_actx.state === 'suspended') _actx.resume();
  return _actx;
}

async function _playSfx(name) {
  if (!_sfxOn) return;
  try {
    if (!_sfxCache[name]) {
      const r = await fetch(`/audio/sfx/${name}`);
      if (!r.ok) return;
      const ab  = await r.arrayBuffer();
      _sfxCache[name] = await _audioCtx().decodeAudioData(ab);
    }
    if (!_sfxOn) return;
    const src = _audioCtx().createBufferSource();
    src.buffer = _sfxCache[name];
    src.connect(_audioCtx().destination);
    src.start();
  } catch (_) {}
}

document.getElementById('sfx-row').addEventListener('click', () => {
  _sfxOn = !_sfxOn;
  _setTrack(_sfxTrack, _sfxOn);
  try {
    fetch('/audio-toggle', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ sfx: _sfxOn }),
    });
  } catch (_) {}
});

// ═══════════════════════════════════════════════════════════════════
// WORLD CLOCK
// ═══════════════════════════════════════════════════════════════════

const _wcEl   = document.getElementById('world-clock');
const _wcIcon = document.getElementById('wc-icon');
const _wcDate = document.getElementById('wc-date');
const _wcSub  = document.getElementById('wc-sub');

const TIME_ICONS = {
  dawn:    '🌅',
  morning: '☀',
  midday:  '☀',
  noon:    '☀',
  afternoon:'☀',
  evening: '🌆',
  dusk:    '🌆',
  night:   '🌙',
  midnight:'🌙',
  late:    '🌙',
};

const WEATHER_ICONS = {
  rain:    '🌧',
  storm:   '⛈',
  fog:     '🌫',
  snow:    '❄',
  cloudy:  '☁',
  overcast:'☁',
  windy:   '💨',
  clear:   '',
  calm:    '',
};

function updateWorldClock(wt) {
  if (!wt) return;
  const timeKey    = (wt.time || '').toLowerCase();
  const weatherKey = Object.keys(WEATHER_ICONS).find(k => (wt.weather||'').toLowerCase().includes(k)) || '';

  const timeIcon    = TIME_ICONS[timeKey]    || '☀';
  const weatherIcon = WEATHER_ICONS[weatherKey] || '';

  _wcIcon.textContent = (weatherIcon || timeIcon);
  _wcDate.textContent = wt.date    || '';
  _wcSub.textContent  = [wt.season, wt.day_name].filter(Boolean).join(' · ');

  _wcEl.classList.add('has-data');
  skyRenderer.setState(wt);
}

// ═══════════════════════════════════════════════════════════════════
// SIDEBAR TOGGLE
// ═══════════════════════════════════════════════════════════════════

const _sidebar      = document.getElementById('sidebar');
const _sidebarBtn   = document.getElementById('sidebar-toggle');
const _textScroll   = document.getElementById('text-scroll');
let _sidebarVisible = true;

function _setSidebarVisible(visible) {
  _sidebarVisible = visible;
  if (visible) {
    _sidebar.classList.remove('hidden');
    _textScroll.classList.remove('sidebar-hidden');
    _sidebarBtn.textContent = '◀ Hide';
  } else {
    _sidebar.classList.add('hidden');
    _textScroll.classList.add('sidebar-hidden');
    _sidebarBtn.textContent = '▶ Stats';
  }
}

_sidebarBtn.addEventListener('click', () => _setSidebarVisible(!_sidebarVisible));

// Toggle button becomes visible once sidebar has data (called from SSE handler)

// ═══════════════════════════════════════════════════════════════════
// SSE CONNECTION
// ═══════════════════════════════════════════════════════════════════

let evtSource = null;
let reconnectDelay = 1000;

function connect() {
  evtSource = new EventSource('/stream');

  evtSource.onopen = () => {
    reconnectDelay = 1000;
  };

  evtSource.onmessage = (e) => {
    let payload;
    try { payload = JSON.parse(e.data); } catch { return; }

    if (payload.stats) {
      updateStats(payload.stats);
      if (payload.stats.players && payload.stats.players.length > 0) {
        _sidebarBtn.classList.add('visible');
      }
      if (payload.stats.world_time) {
        updateWorldClock(payload.stats.world_time);
      }
    }
    if (payload.clear) {
      // Wipe sidebar player data and DOM
      for (const key of Object.keys(_playerData)) delete _playerData[key];
      document.querySelectorAll('.sb-player').forEach(el => el.remove());
      const sbEl = document.getElementById('sidebar');
      if (sbEl) sbEl.classList.remove('has-data');
      const turnSectionEl = document.getElementById('sb-turn-section');
      if (turnSectionEl) turnSectionEl.style.display = 'none';
      _sidebarBtn.classList.remove('visible');
      _setSidebarVisible(true);   // reset to visible for next campaign
      clearDisplay();
    }
    if (payload.replay_batch) {
      renderReplayBatch(payload.replay_batch);
    }
    if (payload.replay) {
      renderReplay(payload.replay);  // legacy fallback
    }
    if (payload.scene) {
      applyScene(payload.scene);
    }
    if (payload.sfx) {
      _playSfx(payload.sfx);
    }
    if (payload.text) {
      if (payload.player) {
        renderPlayerBlock(payload.player, payload.text);
      } else if (payload.npc) {
        renderNPCBlock(payload.npc, payload.text);
      } else if (payload.dice) {
        renderDiceBlock(payload.text);
      } else {
        handleIncomingText(payload.text);
      }
    }
  };

  evtSource.onerror = () => {
    evtSource.close();
    setTimeout(() => {
      reconnectDelay = Math.min(reconnectDelay * 1.5, 15000);
      connect();
    }, reconnectDelay);
  };
}

connect();
</script>
