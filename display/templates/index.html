<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DnD — Dungeon Master</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=IM+Fell+English:ital@0;1&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  html, body {
    width: 100%; height: 100%;
    overflow: hidden;
    background: #000;
    color: #d4c4a0;
    font-family: 'IM Fell English', Georgia, serif;
    font-size: 20px;
    line-height: 1.85;
  }

  /* ── Background gradient layers (A/B crossfade) ── */
  .bg-layer {
    position: fixed; inset: 0;
    transition: opacity 2.5s ease;
    pointer-events: none;
    z-index: 0;
  }
  #bg-a { opacity: 1; }
  #bg-b { opacity: 0; }

  /* ── Particle canvas ── */
  #particles {
    position: fixed; inset: 0;
    pointer-events: none;
    z-index: 1;
  }

  /* ── Vignette ── */
  #vignette {
    position: fixed; inset: 0;
    background: radial-gradient(ellipse at 50% 45%,
      transparent 30%,
      rgba(0,0,0,0.55) 70%,
      rgba(0,0,0,0.88) 100%);
    pointer-events: none;
    z-index: 2;
  }

  /* ── Decorative border frame ── */
  #frame {
    position: fixed; inset: 16px;
    border: 1px solid rgba(180, 140, 60, 0.25);
    border-radius: 2px;
    box-shadow:
      inset 0 0 60px rgba(0,0,0,0.4),
      0 0 30px rgba(0,0,0,0.7);
    pointer-events: none;
    z-index: 3;
  }
  /* Corner accents */
  #frame::before, #frame::after {
    content: '';
    position: absolute;
    width: 24px; height: 24px;
    border-color: rgba(180, 140, 60, 0.5);
    border-style: solid;
  }
  #frame::before {
    top: -1px; left: -1px;
    border-width: 2px 0 0 2px;
  }
  #frame::after {
    bottom: -1px; right: -1px;
    border-width: 0 2px 2px 0;
  }

  /* ── Scene indicator ── */
  #scene-indicator {
    position: fixed;
    top: 32px;
    left: 50%;
    transform: translateX(-50%);
    font-family: 'Cinzel', serif;
    font-size: 11px;
    letter-spacing: 5px;
    text-transform: uppercase;
    color: rgba(180, 140, 60, 0.6);
    pointer-events: none;
    z-index: 5;
    transition: opacity 0.8s ease;
    white-space: nowrap;
  }
  #scene-indicator.changing {
    opacity: 0;
    transition: opacity 0.4s ease;
  }

  /* ── Text scroll area ── */
  #text-scroll {
    position: fixed; inset: 0;
    overflow-y: auto;
    overflow-x: hidden;
    padding: 72px 18vw 80px;
    z-index: 4;
    scroll-behavior: smooth;
    /* Hide scrollbar but keep scroll */
    scrollbar-width: none;
  }
  #text-scroll::-webkit-scrollbar { display: none; }

  /* ── Text content ── */
  #text-content {
    max-width: 820px;
    margin: 0 auto;
    transition: opacity 0.35s ease;
  }

  .dm-block {
    margin-bottom: 2.2em;
    opacity: 0;
    animation: fadeIn 0.6s ease forwards;
  }
  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(6px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  .dm-block p {
    color: #d4c4a0;
    text-shadow: 0 1px 6px rgba(0,0,0,0.8);
  }

  /* Italic for atmospheric/narration lines */
  .dm-block p em { color: #c8b080; }

  /* ── Player action blocks ── */
  .player-block {
    margin-bottom: 2em;
    opacity: 0;
    animation: fadeIn 0.5s ease forwards;
    border-left: 2px solid rgba(120, 175, 210, 0.3);
    padding-left: 1.2em;
  }

  .player-name {
    font-family: 'Cinzel', serif;
    font-size: 10px;
    letter-spacing: 4px;
    text-transform: uppercase;
    color: rgba(130, 185, 215, 0.75);
    margin-bottom: 0.45em;
  }

  .player-block p {
    color: #94b8cc;
    font-style: italic;
    font-size: 0.92em;
    text-shadow: 0 1px 6px rgba(0,0,0,0.8);
  }

  /* ── Dice result blocks ── */
  .dice-block {
    margin: 0.4em 0 1.6em;
    opacity: 0;
    animation: fadeIn 0.3s ease forwards;
    text-align: center;
  }

  .dice-result {
    display: inline-block;
    font-family: 'Cinzel', serif;
    font-size: 12px;
    letter-spacing: 2px;
    color: #c8a040;
    text-shadow: 0 0 10px rgba(200, 160, 64, 0.3);
    padding: 0.25em 1.2em;
    border: 1px solid rgba(200, 160, 64, 0.18);
    border-radius: 1px;
  }

  /* Session divider */
  .divider {
    text-align: center;
    color: rgba(180, 140, 60, 0.4);
    font-family: 'Cinzel', serif;
    font-size: 11px;
    letter-spacing: 4px;
    margin: 2em 0;
    user-select: none;
  }
  .divider::before, .divider::after {
    content: '— ';
  }

  /* Cursor blink */
  .cursor {
    display: inline-block;
    width: 2px;
    height: 1.1em;
    background: rgba(180, 140, 60, 0.8);
    vertical-align: middle;
    margin-left: 2px;
    animation: blink 1s step-end infinite;
  }
  @keyframes blink {
    0%, 100% { opacity: 1; }
    50%       { opacity: 0; }
  }

  /* Bottom fade gradient to hint there's more */
  #bottom-fade {
    position: fixed;
    bottom: 0; left: 0; right: 0;
    height: 80px;
    background: linear-gradient(transparent, rgba(0,0,0,0.7));
    pointer-events: none;
    z-index: 4;
  }

  /* ══════════════════════════════════════════════════════════
     CHARACTER SIDEBAR
     Fixed left column. Compact player cards stack vertically.
     Ability scores shown only when there is exactly 1 player.
     ══════════════════════════════════════════════════════════ */

  #sidebar {
    position: fixed;
    left: 28px;
    top: 60px;
    bottom: 28px;
    width: 175px;
    z-index: 4;
    overflow-y: auto;
    overflow-x: hidden;
    scrollbar-width: none;
    background: linear-gradient(to right, rgba(0,0,0,0.45) 60%, transparent);
    border-right: 1px solid rgba(180,140,60,0.1);
    padding: 10px 12px 16px;
    opacity: 0;
    transition: opacity 0.7s ease;
  }
  #sidebar.has-data { opacity: 1; }
  #sidebar::-webkit-scrollbar { display: none; }

  /* ── Player card ── */
  .sb-player {
    margin-bottom: 14px;
    padding-bottom: 14px;
    border-bottom: 1px solid rgba(180,140,60,0.1);
  }
  .sb-player:last-of-type { border-bottom: none; margin-bottom: 0; }

  .sb-name {
    font-family: 'Cinzel', serif;
    font-size: 12px;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: rgba(200,165,80,0.9);
    margin-bottom: 2px;
  }
  .sb-identity {
    font-size: 10px;
    color: rgba(200,185,150,0.5);
    line-height: 1.4;
    margin-bottom: 8px;
  }

  /* ── HP row ── */
  .sb-hp-row {
    display: flex;
    justify-content: space-between;
    align-items: baseline;
    margin-bottom: 3px;
  }
  .sb-label {
    font-family: 'Cinzel', serif;
    font-size: 8px;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: rgba(180,140,60,0.5);
  }
  .sb-hp-nums {
    font-family: 'Cinzel', serif;
    font-size: 10px;
    color: rgba(220,200,160,0.75);
  }
  .sb-bar-track {
    height: 3px;
    background: rgba(255,255,255,0.07);
    border-radius: 2px;
    overflow: hidden;
    margin-bottom: 3px;
  }
  .sb-bar-fill {
    height: 100%;
    border-radius: 2px;
    transition: width 0.6s ease, background-color 0.6s ease;
  }
  .sb-hp-temp-row {
    font-size: 9px;
    color: rgba(120,180,230,0.6);
    margin-bottom: 3px;
  }

  /* ── XP row ── */
  .sb-xp-row {
    display: flex;
    justify-content: space-between;
    align-items: baseline;
    margin-top: 4px;
    margin-bottom: 2px;
  }
  .sb-xp-nums {
    font-family: 'Cinzel', serif;
    font-size: 9px;
    color: rgba(180,140,60,0.55);
  }
  .sb-xp-bar { background: rgba(180,140,60,0.4); }

  /* ── Quick stats (AC · Init · Speed) ── */
  .sb-quick-stats {
    margin-top: 6px;
    font-family: 'Cinzel', serif;
    font-size: 9px;
    letter-spacing: 1px;
    color: rgba(200,185,150,0.55);
    line-height: 1.8;
  }
  .sb-quick-stats span.val {
    color: rgba(220,200,160,0.8);
    margin-right: 8px;
  }

  /* ── Features (Second Wind etc) ── */
  .sb-features {
    margin-top: 4px;
    font-size: 9px;
    color: rgba(200,185,150,0.4);
    line-height: 1.6;
  }

  /* ── Ability scores — only rendered when 1 player ── */
  .sb-abilities {
    margin-top: 10px;
    padding-top: 8px;
    border-top: 1px solid rgba(180,140,60,0.08);
  }
  .sb-ab-grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 5px 2px;
  }
  .sb-ab-cell {
    text-align: center;
  }
  .sb-ab-name {
    font-family: 'Cinzel', serif;
    font-size: 7.5px;
    letter-spacing: 1px;
    color: rgba(180,140,60,0.45);
    text-transform: uppercase;
  }
  .sb-ab-score {
    font-family: 'Cinzel', serif;
    font-size: 12px;
    color: rgba(220,200,160,0.8);
    line-height: 1.2;
  }
  .sb-ab-mod {
    font-size: 9px;
    color: rgba(180,140,60,0.65);
    font-family: 'IM Fell English', Georgia, serif;
  }

  /* ── Turn order section ── */
  #sb-turn-section {
    margin-top: 14px;
    padding-top: 10px;
    border-top: 1px solid rgba(180,140,60,0.12);
  }
  .sb-turn-header {
    font-family: 'Cinzel', serif;
    font-size: 8px;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: rgba(180,140,60,0.55);
    margin-bottom: 6px;
  }
  .sb-turn-item {
    font-size: 10px;
    color: rgba(200,185,150,0.4);
    padding: 2px 0 2px 14px;
    line-height: 1.5;
    position: relative;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .sb-turn-item.sb-turn-current {
    color: rgba(220,200,160,0.95);
    font-family: 'Cinzel', serif;
    font-size: 10px;
  }
  .sb-turn-item.sb-turn-current::before {
    content: '▶';
    position: absolute;
    left: 0;
    font-size: 7px;
    color: rgba(180,140,60,0.8);
    top: 4px;
  }
</style>
</head>
<body>

<!-- Background layers -->
<div id="bg-a" class="bg-layer"></div>
<div id="bg-b" class="bg-layer"></div>

<!-- Particles -->
<canvas id="particles"></canvas>

<!-- Overlays -->
<div id="vignette"></div>
<div id="frame"></div>
<div id="scene-indicator">— The Inn —</div>
<div id="bottom-fade"></div>

<!-- Character sidebar -->
<div id="sidebar">
  <!-- Player cards are injected here by updateStats() -->
  <!-- Turn order section (shown only during combat) -->
  <div id="sb-turn-section" style="display:none">
    <div class="sb-turn-header">Round <span id="sb-round">1</span></div>
    <div id="sb-turn-list"></div>
  </div>
</div>

<!-- Text -->
<div id="text-scroll">
  <div id="text-content"></div>
</div>

<script>
'use strict';

// ═══════════════════════════════════════════════════════════════════
// SCENE MANAGEMENT
// ═══════════════════════════════════════════════════════════════════

const SCENE_DEFAULTS = {
  colors: ['#1a0800', '#2e1400'],
  accent: '#c8601a',
  particles: 'embers',
  label: 'The Inn',
  name: 'tavern',
};

let activeScene = { ...SCENE_DEFAULTS };
let bgActive = 'a'; // which bg layer is currently showing

function applyScene(scene) {
  if (!scene || scene.name === activeScene.name) return;
  activeScene = { ...SCENE_DEFAULTS, ...scene };

  // Update scene indicator with a fade
  const indicator = document.getElementById('scene-indicator');
  indicator.classList.add('changing');
  setTimeout(() => {
    indicator.textContent = '— ' + (activeScene.label || activeScene.name) + ' —';
    indicator.classList.remove('changing');
  }, 400);

  // Crossfade background layers
  const incoming = bgActive === 'a' ? 'b' : 'a';
  const inEl  = document.getElementById('bg-' + incoming);
  const outEl = document.getElementById('bg-' + bgActive);

  const [top, bot] = activeScene.colors;
  inEl.style.background =
    `radial-gradient(ellipse at 50% 30%, ${top} 0%, ${bot} 100%)`;
  inEl.style.opacity = '1';
  outEl.style.opacity = '0';
  bgActive = incoming;

  // Switch particle type
  particleSystem.switchType(activeScene.particles, activeScene.accent);
}

// Initialise background to default scene
;(function initBg() {
  const el = document.getElementById('bg-' + bgActive);
  const [top, bot] = SCENE_DEFAULTS.colors;
  el.style.background =
    `radial-gradient(ellipse at 50% 30%, ${top} 0%, ${bot} 100%)`;
})();


// ═══════════════════════════════════════════════════════════════════
// PARTICLE SYSTEM
// ═══════════════════════════════════════════════════════════════════

const canvas  = document.getElementById('particles');
const ctx     = canvas.getContext('2d');
let W = 0, H = 0;

function resizeCanvas() {
  const dpr = window.devicePixelRatio || 1;
  W = window.innerWidth;
  H = window.innerHeight;
  canvas.width  = W * dpr;
  canvas.height = H * dpr;
  canvas.style.width  = W + 'px';
  canvas.style.height = H + 'px';
  ctx.scale(dpr, dpr);
}
window.addEventListener('resize', resizeCanvas);
resizeCanvas();

// ── Particle classes ──────────────────────────────────────────────

function rand(a, b) { return a + Math.random() * (b - a); }
function randInt(a, b) { return Math.floor(rand(a, b + 1)); }
function hexToRgb(hex) {
  const r = parseInt(hex.slice(1,3),16);
  const g = parseInt(hex.slice(3,5),16);
  const b = parseInt(hex.slice(5,7),16);
  return [r,g,b];
}

class Particle {
  constructor(type, accent) {
    this.type   = type;
    this.accent = accent;
    this.reset();
  }
  reset() {
    const T = this.type;
    this.x    = rand(0, W);
    this.y    = rand(0, H);
    this.life = 0;
    this.maxLife = 1;
    this.size = 2;
    this.alpha = 0;
    this.vx = 0; this.vy = 0;
    this._phase = rand(0, Math.PI * 2);

    if (T === 'embers') {
      this.x = rand(0, W);
      this.y = rand(H * 0.6, H);
      this.vx = rand(-0.4, 0.4);
      this.vy = rand(-0.8, -0.3);
      this.size = rand(1, 3);
      this.maxLife = rand(120, 300);
      this._color = this.accent;
    } else if (T === 'fireflies') {
      this.x = rand(0, W);
      this.y = rand(H * 0.2, H * 0.9);
      this.vx = rand(-0.3, 0.3);
      this.vy = rand(-0.2, 0.2);
      this.size = rand(1.5, 3.5);
      this.maxLife = rand(200, 500);
      this._color = '#a0ff60';
    } else if (T === 'smoke') {
      this.x = rand(0, W);
      this.y = H + 10;
      this.vx = rand(-0.2, 0.2);
      this.vy = rand(-0.4, -0.15);
      this.size = rand(6, 18);
      this.maxLife = rand(180, 350);
      this._color = '#404040';
    } else if (T === 'dust') {
      this.x = rand(0, W);
      this.y = rand(0, H);
      this.vx = rand(-0.1, 0.1);
      this.vy = rand(-0.05, 0.08);
      this.size = rand(0.5, 1.8);
      this.maxLife = rand(300, 600);
      this._color = '#a09060';
    } else if (T === 'snow') {
      this.x = rand(-10, W + 10);
      this.y = rand(-10, 0);
      this.vx = rand(-0.3, 0.3);
      this.vy = rand(0.4, 1.2);
      this.size = rand(1, 3.5);
      this.maxLife = rand(200, 450);
      this._color = '#d8e8ff';
    } else if (T === 'stars') {
      this.x = rand(0, W);
      this.y = rand(0, H * 0.8);
      this.vx = 0; this.vy = 0;
      this.size = rand(0.5, 2);
      this.maxLife = rand(400, 900);
      this._color = '#c0d0ff';
    } else if (T === 'bubbles') {
      this.x = rand(0, W);
      this.y = H + 10;
      this.vx = rand(-0.2, 0.2);
      this.vy = rand(-0.5, -0.2);
      this.size = rand(2, 8);
      this.maxLife = rand(200, 400);
      this._color = '#60a0d0';
    } else if (T === 'sparks') {
      this.x = rand(0, W);
      this.y = rand(H * 0.4, H);
      this.vx = rand(-1.5, 1.5);
      this.vy = rand(-2, -0.5);
      this.size = rand(0.8, 2.5);
      this.maxLife = rand(40, 100);
      this._color = '#ffe060';
    } else if (T === 'sand') {
      this.x = rand(-20, 0);
      this.y = rand(0, H);
      this.vx = rand(1.2, 2.8);
      this.vy = rand(-0.2, 0.4);
      this.size = rand(0.8, 2.2);
      this.maxLife = rand(150, 350);
      this._color = '#c0a060';
    } else if (T === 'rain') {
      this.x = rand(-20, W);
      this.y = rand(-20, 0);
      this.vx = rand(0.5, 1.2);
      this.vy = rand(6, 14);
      this.size = rand(1, 2);
      this.maxLife = rand(60, 120);
      this._color = '#8090b0';
    } else if (T === 'drips') {
      this.x = rand(0, W);
      this.y = rand(-20, 0);
      this.vx = 0;
      this.vy = rand(1.5, 4);
      this.size = rand(1.5, 3.5);
      this.maxLife = rand(80, 180);
      this._color = '#6090b0';
    } else {
      // fallback = dust
      this.vx = 0; this.vy = 0;
      this.size = 1;
      this.maxLife = 300;
      this._color = '#808080';
    }
  }

  update() {
    this.life++;
    const T = this.type;
    const progress = this.life / this.maxLife;

    // Alpha envelope: fade in first 10%, full mid, fade out last 20%
    if (progress < 0.1)       this.alpha = progress / 0.1;
    else if (progress > 0.8)  this.alpha = (1 - progress) / 0.2;
    else                      this.alpha = 1;

    this.x += this.vx;
    this.y += this.vy;

    if (T === 'embers') {
      this.vx += rand(-0.05, 0.05);
      this.vx  = Math.max(-0.6, Math.min(0.6, this.vx));
      if (this.life % 20 === 0) this.alpha *= rand(0.5, 1.0);
    } else if (T === 'fireflies') {
      this._phase += 0.03;
      this.x += Math.sin(this._phase) * 0.5;
      this.y += Math.cos(this._phase * 0.7) * 0.3;
      this.alpha *= (0.85 + 0.15 * Math.sin(this._phase * 2));
    } else if (T === 'smoke') {
      this.size += 0.04;
      this.vx  += rand(-0.01, 0.01);
    } else if (T === 'stars') {
      this._phase += 0.02;
      this.alpha *= (0.85 + 0.15 * Math.sin(this._phase));
    } else if (T === 'sparks') {
      this.vy += 0.08; // gravity
    }

    return this.life < this.maxLife;
  }

  draw(ctx) {
    const T = this.type;
    const [r,g,b] = hexToRgb(this._color);
    ctx.globalAlpha = Math.max(0, Math.min(1, this.alpha));

    if (T === 'smoke') {
      const grad = ctx.createRadialGradient(
        this.x, this.y, 0, this.x, this.y, this.size);
      grad.addColorStop(0, `rgba(${r},${g},${b},0.3)`);
      grad.addColorStop(1, `rgba(${r},${g},${b},0)`);
      ctx.fillStyle = grad;
      ctx.beginPath();
      ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
      ctx.fill();
    } else if (T === 'embers' || T === 'fireflies' || T === 'sparks') {
      // Glow effect
      const glow = ctx.createRadialGradient(
        this.x, this.y, 0, this.x, this.y, this.size * 3);
      glow.addColorStop(0, `rgba(${r},${g},${b},0.6)`);
      glow.addColorStop(1, `rgba(${r},${g},${b},0)`);
      ctx.fillStyle = glow;
      ctx.beginPath();
      ctx.arc(this.x, this.y, this.size * 3, 0, Math.PI * 2);
      ctx.fill();
      // Core dot
      ctx.fillStyle = `rgb(${Math.min(255,r+60)},${Math.min(255,g+40)},${Math.min(255,b+20)})`;
      ctx.beginPath();
      ctx.arc(this.x, this.y, this.size * 0.6, 0, Math.PI * 2);
      ctx.fill();
    } else if (T === 'bubbles') {
      ctx.strokeStyle = `rgba(${r},${g},${b},0.6)`;
      ctx.lineWidth = 0.8;
      ctx.beginPath();
      ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
      ctx.stroke();
    } else if (T === 'rain') {
      ctx.strokeStyle = `rgba(${r},${g},${b},0.5)`;
      ctx.lineWidth = 0.8;
      ctx.beginPath();
      ctx.moveTo(this.x, this.y);
      ctx.lineTo(this.x + this.vx * 3, this.y + this.vy * 3);
      ctx.stroke();
    } else if (T === 'drips') {
      ctx.fillStyle = `rgba(${r},${g},${b},0.7)`;
      ctx.beginPath();
      ctx.ellipse(this.x, this.y, this.size * 0.4, this.size, 0, 0, Math.PI * 2);
      ctx.fill();
    } else {
      ctx.fillStyle = `rgba(${r},${g},${b},1)`;
      ctx.beginPath();
      ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
      ctx.fill();
    }

    ctx.globalAlpha = 1;
  }
}

// ── Particle system controller ────────────────────────────────────

const PARTICLE_COUNT = {
  embers: 80, fireflies: 45, smoke: 20, dust: 90,
  snow: 110, stars: 160, bubbles: 45, sparks: 50,
  sand: 80, rain: 130, drips: 35,
};

const particleSystem = {
  particles: [],
  type: 'embers',
  accent: SCENE_DEFAULTS.accent,
  transitioning: false,

  init() {
    this.populate(this.type, this.accent);
  },

  populate(type, accent) {
    const count = PARTICLE_COUNT[type] || 60;
    this.particles = [];
    for (let i = 0; i < count; i++) {
      const p = new Particle(type, accent);
      p.life = randInt(0, p.maxLife);  // stagger so they don't all start together
      this.particles.push(p);
    }
  },

  switchType(newType, accent) {
    if (newType === this.type) return;
    this.type   = newType;
    this.accent = accent || '#ffffff';
    // Fade out current by letting them die, then repopulate
    // Mark old particles so they run out fast
    this.particles.forEach(p => { p.life = Math.max(p.life, p.maxLife - 30); });
    // Add new particles over ~2s
    let added = 0;
    const target = PARTICLE_COUNT[newType] || 60;
    const interval = setInterval(() => {
      if (added >= target) { clearInterval(interval); return; }
      const p = new Particle(newType, this.accent);
      this.particles.push(p);
      added++;
    }, 2000 / target);
  },

  update() {
    this.particles = this.particles.filter(p => p.update());
    // Replenish
    const target = PARTICLE_COUNT[this.type] || 60;
    while (this.particles.length < target) {
      const p = new Particle(this.type, this.accent);
      this.particles.push(p);
    }
  },

  draw() {
    ctx.clearRect(0, 0, W, H);
    this.particles.forEach(p => p.draw(ctx));
  },
};

particleSystem.init();

// ── Animation loop ────────────────────────────────────────────────

function loop() {
  particleSystem.update();
  particleSystem.draw();
  requestAnimationFrame(loop);
}
loop();


// ═══════════════════════════════════════════════════════════════════
// TYPEWRITER / TEXT RENDERING
// ═══════════════════════════════════════════════════════════════════

const textScroll  = document.getElementById('text-scroll');
const textContent = document.getElementById('text-content');

let charQueue    = [];
let isTyping     = false;
let currentEl    = null;
let currentCursor = null;
let lastChunkTime = Date.now();
let idleTimer     = null;

const CHAR_DELAY = 18;   // ms per character while typing
const IDLE_GAP   = 1800; // ms silence before starting a new block

function getOrCreateBlock() {
  if (!currentEl) {
    currentEl = document.createElement('div');
    currentEl.className = 'dm-block';
    const p = document.createElement('p');
    currentEl.appendChild(p);
    textContent.appendChild(currentEl);
    scrollToBottom();
  }
  return currentEl.querySelector('p:last-child');
}

function typeNextChar() {
  if (charQueue.length === 0) {
    isTyping = false;
    // Keep cursor blinking at end
    return;
  }

  const ch = charQueue.shift();
  const p  = getOrCreateBlock();

  // Remove cursor from previous position
  if (currentCursor && currentCursor.parentNode) {
    currentCursor.parentNode.removeChild(currentCursor);
  }

  if (ch === '\n') {
    // New paragraph inside same block — unless it's a blank line
    const next = document.createElement('p');
    currentEl.appendChild(next);
  } else {
    p.appendChild(document.createTextNode(ch));
  }

  // Re-add cursor
  currentCursor = document.createElement('span');
  currentCursor.className = 'cursor';
  const lastP = currentEl.querySelector('p:last-child');
  lastP.appendChild(currentCursor);

  scrollToBottom();
  setTimeout(typeNextChar, CHAR_DELAY);
}

function startTyping() {
  if (isTyping) return;
  isTyping = true;
  typeNextChar();
}

function flushNewBlock() {
  // Finalise the current block and start a fresh one next time
  if (currentCursor && currentCursor.parentNode) {
    currentCursor.parentNode.removeChild(currentCursor);
    currentCursor = null;
  }
  // Add a soft divider if there was content
  if (currentEl) {
    const div = document.createElement('div');
    div.className = 'divider';
    div.textContent = '✦';
    textContent.appendChild(div);
  }
  currentEl = null;
}

// ── Player action block ──────────────────────────────────────────────
function renderPlayerBlock(name, text, isReplay) {
  // Close any in-progress DM typewriter cursor
  if (currentCursor && currentCursor.parentNode) {
    currentCursor.parentNode.removeChild(currentCursor);
    currentCursor = null;
  }
  currentEl = null;
  clearTimeout(idleTimer);

  const block = document.createElement('div');
  block.className = 'player-block';
  if (isReplay) block.style.opacity = '0.65';

  const nameEl = document.createElement('div');
  nameEl.className = 'player-name';
  nameEl.textContent = name;
  block.appendChild(nameEl);

  const cleaned = text
    .replace(/[\x00-\x08\x0b-\x1f\x7f]/g, '')
    .replace(/\r/g, '')
    .replace(/\t/g, '  ')
    .trim();

  cleaned.split('\n').forEach(line => {
    const trimmed = line.trim();
    if (!trimmed) return;
    const p = document.createElement('p');
    p.textContent = trimmed;
    block.appendChild(p);
  });

  textContent.appendChild(block);
  scrollToBottom();
}

// ── Dice result block ─────────────────────────────────────────────────
function renderDiceBlock(text, isReplay) {
  const block = document.createElement('div');
  block.className = 'dice-block';
  if (isReplay) block.style.opacity = '0.65';

  const cleaned = text.trim()
    .replace(/[\x00-\x08\x0b-\x1f\x7f]/g, '')
    .replace(/\r/g, '');

  cleaned.split('\n').forEach(line => {
    const trimmed = line.trim();
    if (!trimmed) return;
    const el = document.createElement('div');
    el.className = 'dice-result';
    el.textContent = trimmed;
    block.appendChild(el);
  });

  textContent.appendChild(block);
  scrollToBottom();
}

// ── Replay batch (reconnect / session resume) ─────────────────────────
function renderReplayBatch(items) {
  flushNewBlock();
  items.forEach(item => {
    if (!item || !item.text) return;
    if (item.player) {
      renderPlayerBlock(item.player, item.text, true);
    } else if (item.dice) {
      renderDiceBlock(item.text, true);
    } else {
      const block = document.createElement('div');
      block.className = 'dm-block';
      block.style.opacity = '0.75';
      item.text.split('\n').forEach(line => {
        const p = document.createElement('p');
        p.textContent = line;
        block.appendChild(p);
      });
      textContent.appendChild(block);
    }
  });

  const div = document.createElement('div');
  div.className = 'divider';
  div.textContent = '✦';
  textContent.appendChild(div);

  scrollToBottom();
}

function clearDisplay(then) {
  // Fade out, wipe, fade back in, then call the callback.
  textContent.style.opacity = '0';
  setTimeout(() => {
    // Abort any in-progress typewriter
    charQueue = [];
    isTyping  = false;
    if (currentCursor && currentCursor.parentNode) {
      currentCursor.parentNode.removeChild(currentCursor);
    }
    currentCursor = null;
    currentEl     = null;
    clearTimeout(idleTimer);

    textContent.innerHTML = '';
    textScroll.scrollTop  = 0;
    textContent.style.opacity = '1';

    if (then) then();
  }, 370); // matches the CSS transition duration
}

function handleIncomingText(text) {
  // Debounce block separation: if there was a gap > IDLE_GAP, new block
  const now = Date.now();
  if (now - lastChunkTime > IDLE_GAP && charQueue.length === 0 && !isTyping) {
    flushNewBlock();
  }
  lastChunkTime = now;

  // Reset idle timer
  clearTimeout(idleTimer);
  idleTimer = setTimeout(() => {
    if (!isTyping && charQueue.length === 0) flushNewBlock();
  }, IDLE_GAP * 2);

  // Enqueue characters
  const cleaned = text
    .replace(/[\x00-\x08\x0b-\x1f\x7f]/g, '')  // strip control chars (keep \n \t)
    .replace(/\[[\d;?]*[a-zA-Z]/g, '')           // strip leftover CSI remnants
    .replace(/\r/g, '')
    .replace(/\t/g, '  ');
  for (const ch of cleaned) {
    charQueue.push(ch);
  }

  startTyping();
}

function scrollToBottom() {
  textScroll.scrollTop = textScroll.scrollHeight;
}

function renderReplay(text) {
  // Render historical text instantly (no typewriter) when browser reconnects.
  flushNewBlock();
  const cleaned = text
    .replace(/[\x00-\x08\x0b-\x1f\x7f]/g, '')
    .replace(/\[[\d;?]*[a-zA-Z]/g, '')
    .replace(/\r/g, '')
    .replace(/\t/g, '  ');
  if (!cleaned.trim()) return;

  const block = document.createElement('div');
  block.className = 'dm-block';
  block.style.opacity = '0.75';   // subtle visual distinction for historical text
  cleaned.split('\n').forEach(line => {
    const p = document.createElement('p');
    p.textContent = line;
    block.appendChild(p);
  });
  textContent.appendChild(block);

  // Add a divider after replay so live text starts fresh
  const div = document.createElement('div');
  div.className = 'divider';
  div.textContent = '✦';
  textContent.appendChild(div);

  scrollToBottom();
}


// ═══════════════════════════════════════════════════════════════════
// STATS SIDEBAR
// ═══════════════════════════════════════════════════════════════════

// Keyed by player name so repeated calls merge cleanly.
const _playerData = {};

function _hpColor(pct) {
  if (pct > 60) return '#4a9a4a';
  if (pct > 30) return '#c0901a';
  return '#a03030';
}

function _buildPlayerCard(p, solo) {
  const card = document.createElement('div');
  card.className = 'sb-player';
  card.dataset.playerName = p.name;

  // Name
  const nameEl = document.createElement('div');
  nameEl.className = 'sb-name';
  nameEl.textContent = p.name || '—';
  card.appendChild(nameEl);

  // Identity: Race · Class Level
  const identEl = document.createElement('div');
  identEl.className = 'sb-identity';
  const parts = [];
  if (p.race)  parts.push(p.race);
  if (p.class) parts.push(p.class + (p.level ? ' ' + p.level : ''));
  if (p.background) parts.push(p.background);
  identEl.textContent = parts.join(' · ') || '—';
  card.appendChild(identEl);

  // HP
  const hp = p.hp || {};
  const hpRow = document.createElement('div');
  hpRow.className = 'sb-hp-row';
  hpRow.innerHTML = `<span class="sb-label">HP</span>
    <span class="sb-hp-nums">${hp.current ?? '—'} / ${hp.max ?? '—'}</span>`;
  card.appendChild(hpRow);

  const hpTrack = document.createElement('div');
  hpTrack.className = 'sb-bar-track';
  const hpFill = document.createElement('div');
  hpFill.className = 'sb-bar-fill';
  hpFill.dataset.role = 'hp-fill';
  const hpPct = (hp.max && hp.current != null) ? Math.max(0, Math.min(100, (hp.current / hp.max) * 100)) : 100;
  hpFill.style.width = hpPct + '%';
  hpFill.style.backgroundColor = _hpColor(hpPct);
  hpTrack.appendChild(hpFill);
  card.appendChild(hpTrack);

  if (hp.temp) {
    const tempEl = document.createElement('div');
    tempEl.className = 'sb-hp-temp-row';
    tempEl.dataset.role = 'hp-temp';
    tempEl.textContent = '+' + hp.temp + ' temp';
    card.appendChild(tempEl);
  }

  // XP
  const xp = p.xp || {};
  if (xp.current != null) {
    const xpRow = document.createElement('div');
    xpRow.className = 'sb-xp-row';
    xpRow.innerHTML = `<span class="sb-label">XP</span>
      <span class="sb-xp-nums">${xp.current} / ${xp.next ?? '?'}</span>`;
    card.appendChild(xpRow);
    const xpTrack = document.createElement('div');
    xpTrack.className = 'sb-bar-track';
    const xpFill = document.createElement('div');
    xpFill.className = 'sb-bar-fill sb-xp-bar';
    xpFill.dataset.role = 'xp-fill';
    const xpPct = (xp.next && xp.current != null) ? Math.max(0, Math.min(100, (xp.current / xp.next) * 100)) : 0;
    xpFill.style.width = xpPct + '%';
    xpTrack.appendChild(xpFill);
    card.appendChild(xpTrack);
  }

  // Quick combat stats
  const quickLines = [];
  if (p.ac        != null) quickLines.push(`AC <span class="val">${p.ac}</span>`);
  if (p.initiative != null) quickLines.push(`Init <span class="val">${p.initiative}</span>`);
  if (p.speed     != null) quickLines.push(`Spd <span class="val">${p.speed}</span>`);
  if (p.hit_dice) {
    const hd = p.hit_dice;
    quickLines.push(`HD <span class="val">${hd.remaining ?? '?'}/${hd.max ?? '?'} ${hd.die || ''}</span>`);
  }
  if (quickLines.length) {
    const qs = document.createElement('div');
    qs.className = 'sb-quick-stats';
    qs.innerHTML = quickLines.join('<br>');
    card.appendChild(qs);
  }

  // Features (Second Wind etc)
  const feats = [];
  if (p.second_wind != null) {
    feats.push(p.second_wind ? '2nd Wind ✓' : '2nd Wind ✗');
  }
  if (feats.length) {
    const featEl = document.createElement('div');
    featEl.className = 'sb-features';
    featEl.dataset.role = 'features';
    featEl.innerHTML = feats.map(f => {
      const dim = f.endsWith('✗');
      return `<span style="color:${dim ? 'rgba(200,185,150,0.25)' : 'rgba(140,190,140,0.6)'}">${f}</span>`;
    }).join('<br>');
    card.appendChild(featEl);
  }

  // Ability scores — only for solo play
  if (solo && p.ability_scores) {
    const ab = p.ability_scores;
    const abSection = document.createElement('div');
    abSection.className = 'sb-abilities';
    const grid = document.createElement('div');
    grid.className = 'sb-ab-grid';
    ['str','dex','con','int','wis','cha'].forEach(key => {
      const cell = document.createElement('div');
      cell.className = 'sb-ab-cell';
      const d = ab[key] || {};
      cell.innerHTML = `
        <div class="sb-ab-name">${key.toUpperCase()}</div>
        <div class="sb-ab-score">${d.score ?? '—'}</div>
        <div class="sb-ab-mod">${d.mod ?? '—'}</div>`;
      grid.appendChild(cell);
    });
    abSection.appendChild(grid);
    card.appendChild(abSection);
  }

  return card;
}

function updateStats(stats) {
  if (!stats || !stats.players) return;
  const sidebar = document.getElementById('sidebar');
  const turnSection = document.getElementById('sb-turn-section');
  const solo = stats.players.length === 1;

  // Merge incoming players into _playerData
  stats.players.forEach(p => {
    if (!p.name) return;
    const existing = _playerData[p.name] || {};
    // Deep merge hp, xp, ability_scores; replace scalars
    for (const [k, v] of Object.entries(p)) {
      if (v !== null && typeof v === 'object' && !Array.isArray(v) && typeof existing[k] === 'object') {
        existing[k] = Object.assign({}, existing[k], v);
      } else {
        existing[k] = v;
      }
    }
    _playerData[p.name] = existing;
  });

  // Rebuild all player cards (insert before turn section)
  const names = Object.keys(_playerData);
  names.forEach(name => {
    const p = _playerData[name];
    const existing = sidebar.querySelector(`.sb-player[data-player-name="${CSS.escape(name)}"]`);
    const newCard = _buildPlayerCard(p, solo);
    if (existing) {
      sidebar.insertBefore(newCard, existing);
      existing.remove();
    } else {
      sidebar.insertBefore(newCard, turnSection);
    }
  });

  sidebar.classList.add('has-data');

  // Turn order
  if ('turn_order' in stats) {
    if (!stats.turn_order) {
      turnSection.style.display = 'none';
    } else {
      const to = stats.turn_order;
      // Merge with existing if partial (only current or only round supplied)
      const existingTo = _currentTurnOrder || {};
      const merged = Object.assign({}, existingTo, to);
      _currentTurnOrder = merged;

      turnSection.style.display = '';
      document.getElementById('sb-round').textContent = merged.round ?? 1;
      const list = document.getElementById('sb-turn-list');
      list.innerHTML = '';
      (merged.order || []).forEach(name => {
        const el = document.createElement('div');
        el.className = 'sb-turn-item' + (name === merged.current ? ' sb-turn-current' : '');
        el.textContent = name;
        list.appendChild(el);
      });
    }
  }
}

let _currentTurnOrder = null;

// ═══════════════════════════════════════════════════════════════════
// SSE CONNECTION
// ═══════════════════════════════════════════════════════════════════

let evtSource = null;
let reconnectDelay = 1000;

function connect() {
  evtSource = new EventSource('/stream');

  evtSource.onopen = () => {
    reconnectDelay = 1000;
  };

  evtSource.onmessage = (e) => {
    let payload;
    try { payload = JSON.parse(e.data); } catch { return; }

    if (payload.stats) {
      updateStats(payload.stats);
    }
    if (payload.clear) {
      // Wipe sidebar player data and DOM
      for (const key of Object.keys(_playerData)) delete _playerData[key];
      document.querySelectorAll('.sb-player').forEach(el => el.remove());
      const sbEl = document.getElementById('sidebar');
      if (sbEl) sbEl.classList.remove('has-data');
      const turnSectionEl = document.getElementById('sb-turn-section');
      if (turnSectionEl) turnSectionEl.style.display = 'none';
      clearDisplay();
    }
    if (payload.replay_batch) {
      renderReplayBatch(payload.replay_batch);
    }
    if (payload.replay) {
      renderReplay(payload.replay);  // legacy fallback
    }
    if (payload.scene) {
      applyScene(payload.scene);
    }
    if (payload.text) {
      if (payload.player) {
        renderPlayerBlock(payload.player, payload.text);
      } else if (payload.dice) {
        renderDiceBlock(payload.text);
      } else {
        handleIncomingText(payload.text);
      }
    }
  };

  evtSource.onerror = () => {
    evtSource.close();
    setTimeout(() => {
      reconnectDelay = Math.min(reconnectDelay * 1.5, 15000);
      connect();
    }, reconnectDelay);
  };
}

connect();
